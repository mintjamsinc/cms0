"""
One time-series datapoint produced by routeStats. Counts are banded by
exchange elapsed time so that the chart can stack/colourise the bars:

* under1s — elapsed < 1000ms
* under5s — 1000ms ≤ elapsed < 5000ms
* over5s  — elapsed ≥ 5000ms
"""
type StatPoint {
  """ISO-8601 bucket start instant"""
  bucket: String!

  """Exchanges that completed in under one second"""
  under1s: Int!

  """Exchanges between 1s and 5s"""
  under5s: Int!

  """Exchanges that took 5s or more"""
  over5s: Int!
}

"""Three-band time-series produced by the EIP Console graph panel."""
type RouteStats {
  """ISO-8601 from instant"""
  from: String!

  """ISO-8601 to instant"""
  to: String!

  """Bucket interval actually used (auto-resolved if requested): 5min | 1h | 1d"""
  interval: String!

  """Datapoints ordered oldest-to-newest"""
  points: [StatPoint!]!
}

"""Summary projection of an exchange used in list views."""
type HistoryExchangeSummary {
  exchangeId: String!
