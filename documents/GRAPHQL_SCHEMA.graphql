}

# -----------------------------------------------------------------------------
# Deployment
# -----------------------------------------------------------------------------

type Deployment {
  id: ID!
  name: String
  deploymentTime: DateTime!
  source: String
  tenantId: String
}

input DeploymentResourceInput {
  """Resource file name"""
  name: String!

  """Resource content (BPMN XML or other)"""
  content: String!
}

# -----------------------------------------------------------------------------
# BPM Mutation Inputs
# -----------------------------------------------------------------------------

input StartProcessInput {
  """Process definition key (preferred)"""
  definitionKey: String

  """Process definition ID (specific version)"""
  definitionId: String

  """Business key for correlation"""
  businessKey: String

  """Initial process variables"""
  variables: [ProcessVariableInput!]
}

input CompleteTaskInput {
  """Task ID to complete"""
  taskId: ID!

  """Variables to set on completion"""
  variables: [ProcessVariableInput!]

  """Whether to return updated variables"""
  withVariablesInReturn: Boolean = false
}

input SetJobRetriesInput {
  """Incident ID to retry. The backend resolves the underlying Job from the incident's configuration."""
  incidentId: ID!

  """New retry count. Must be >= 1; the Job Executor will pick the job back up."""
  retries: Int!

  """When true, also clears the incident annotation alongside the retry."""
  clearAnnotation: Boolean = false
}

input SetIncidentAnnotationInput {
  id: ID!
  annotation: String
}

input DeployProcessInput {
  """Deployment name"""
  name: String!

  """Deployment source identifier"""
  source: String

  """Resources to deploy"""
  resources: [DeploymentResourceInput!]!

  """Filter duplicate deployments"""
  enableDuplicateFiltering: Boolean = false

  """Only deploy if changed"""
  deployChangedOnly: Boolean = false
}

# -----------------------------------------------------------------------------
# Process Instance Migration
# -----------------------------------------------------------------------------

"""
One activity-to-activity mapping inside a migration plan.

Multi-instance activities can produce multiple source/target IDs per
instruction; for the simple "map equal activities" case both arrays
contain a single ID and they will be identical.
"""
type MigrationInstruction {
  """Activity IDs in the source process definition."""
  sourceActivityIds: [String!]!

  """Activity IDs in the target process definition."""
  targetActivityIds: [String!]!

  """Whether the engine should refresh the event subscription/timer on migration."""
  updateEventTrigger: Boolean!
}

"""
A built (but not-yet-executed) migration plan. Returned by createMigrationPlan
as a preview. The plan is not persisted on the engine until migrateProcessInstance
is called.
"""
type MigrationPlan {
  sourceProcessDefinitionId: ID!
  targetProcessDefinitionId: ID!
  instructions: [MigrationInstruction!]!
}

"""
A handle to a queued background job that drives a long-running BPM operation
(currently only process-instance migration).  The mutation that issues the
job returns this descriptor immediately; live progress arrives via the
generic `jobProgress(jobId: <id>)` subscription, and the JCR record lives at
`/var/jobs/YYYY/MM/job-<id>` like every other JobManager job.
"""
type MigrationJob {
  """
  CMS-generated job id.  Use this as the argument to
  `jobProgress(jobId: ...)` — it is NOT the Camunda batch id (the batch is
  only created once the worker starts and is recorded on the job node for
  traceability).
  """
  id: ID!

  """JobManager job type — `migrate-instances` for this mutation."""
  jobType: String!

  """Initial job status — typically `queued` immediately after submission."""
  status: String!

  """
  True when this job can be cancelled via an abort mutation.  For Camunda 7
  migrations this is always false: the underlying batch cannot be safely
  cancelled mid-flight, so the client must hide its Abort button.
  """
  abortable: Boolean!
}

input CreateMigrationPlanInput {
  """Source process definition ID (the definition currently used by the instances)."""
  sourceProcessDefinitionId: ID!

  """Target process definition ID (the definition to migrate to)."""
  targetProcessDefinitionId: ID!

  """
  Apply mapEqualActivities() so the engine auto-pairs activities by ID.
  Defaults to true; the only automated strategy supported by this API today.
  """
  mapEqualActivities: Boolean = true

  """
  Apply updateEventTriggers() so event subscriptions/timers are refreshed
  to point at the target definition's element configuration.
  """
  updateEventTriggers: Boolean = false
}

input MigrateProcessInstanceInput {
  sourceProcessDefinitionId: ID!
  targetProcessDefinitionId: ID!

  """
  Explicit list of process-instance IDs to migrate. Either this or
  allActiveInstances must be supplied.
  """
  processInstanceIds: [ID!]

  """
  When true, migrate all currently-active instances of the source definition
  (uses runtimeService.createProcessInstanceQuery().processDefinitionId(src).active()).
  """
  allActiveInstances: Boolean = false

  mapEqualActivities: Boolean = true
  updateEventTriggers: Boolean = false

  """Skip custom execution listeners during migration."""
  skipCustomListeners: Boolean = false

  """Skip BPMN I/O mappings during migration."""
  skipIoMappings: Boolean = false
}

