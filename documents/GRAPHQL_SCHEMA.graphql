    """Whether to watch descendant nodes"""
    deep: Boolean = false
  ): NodeChangeEvent!

  # -------------------------------------------------------------------------
  # BPM Events
  # -------------------------------------------------------------------------

  """Subscribe to task assignment events"""
  taskAssigned(
    """Filter by assignee (null for all)"""
    assignee: String
  ): TaskEvent!

  """Subscribe to task completion events"""
  taskCompleted(
    """Filter by process instance ID (null for all)"""
    processInstanceId: String
  ): TaskEvent!

  """Subscribe to process start events"""
  processStarted(
    """Filter by definition key (null for all)"""
    definitionKey: String
  ): ProcessEvent!

  """Subscribe to process end events"""
  processEnded(
    """Filter by definition key (null for all)"""
    definitionKey: String
  ): ProcessEvent!

  # -------------------------------------------------------------------------
  # EIP Events
  # -------------------------------------------------------------------------

  """Subscribe to route state changes"""
  routeStateChanged(
    """Filter by route ID (null for all)"""
