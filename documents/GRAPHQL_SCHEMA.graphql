  """Activity ID from BPMN"""
  activityId: String!

  """Activity name"""
  activityName: String

  """Activity type (userTask, serviceTask, etc.)"""
  activityType: String!

  """Start time"""
  startTime: DateTime!

  """End time (if completed)"""
  endTime: DateTime

  """Duration in milliseconds"""
  durationInMillis: Long

  """Whether the activity was canceled"""
  canceled: Boolean!

  """Whether scope was completed"""
  completeScope: Boolean!
}

# -----------------------------------------------------------------------------
# Task Comment
# -----------------------------------------------------------------------------

type TaskComment {
  id: ID!
  taskId: String!
