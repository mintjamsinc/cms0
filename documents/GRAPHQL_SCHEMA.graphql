# =============================================================================
# ROOT TYPES
# =============================================================================

type Query {
  # -------------------------------------------------------------------------
  # Content Management
  # -------------------------------------------------------------------------

  """Get a single node by path"""
  node(path: String!): Node

  """List children of a node"""
  children(
    path: String!
    first: Int = 20
    after: String
  ): NodeConnection!

  """Get nodes that reference a given node"""
  references(
    path: String!
    first: Int = 20
    after: String
  ): NodeConnection!

  """Get access control list for a node"""
  accessControl(path: String!): AccessControl!

  """Get version history for a node"""
  versionHistory(path: String!): VersionHistory

  """Execute an XPath query"""
  xpath(
    query: String!
    first: Int = 20
    after: String
  ): NodeConnection!

  """Full-text search (nt:file nodes only)"""
  search(
    text: String!
    path: String = "/"
    first: Int = 20
    after: String
  ): NodeConnection!

  """Execute a JCR query (JCR-SQL2, XPath, or SQL)"""
  query(
    statement: String!
    language: String = "JCR-SQL2"
    first: Int = 20
    after: String
  ): NodeConnection!

  # -------------------------------------------------------------------------
  # Webtop Applications
  # -------------------------------------------------------------------------

  """
  List Webtop applications under an apps root directory. Each app's metadata
  is resolved server-side from its app.yml descriptor, so the whole catalog
  loads in a single (paginated) request.
  """
  apps(
    path: String!
    first: Int = 100
    after: String
  ): AppConnection!

  # -------------------------------------------------------------------------
  # Workspaces
  # -------------------------------------------------------------------------

  """
  List the workspaces available in the repository, the system workspace
  (the identity store) first, the rest in alphabetical order. Each entry
  carries its lifecycle state and the state of its per-workspace engines.
  """
  workspaces: [Workspace!]!

  """
  Report the cluster topology of the queried workspace: whether this node
  runs as part of a cluster, the identifier of the node serving the
  request, and every registered member with its heartbeat health.
  Requires administrative privileges.
  """
  cluster: Cluster!

  # -------------------------------------------------------------------------
  # Business Process Management
  # -------------------------------------------------------------------------

  """Get a process definition by ID or key"""
  processDefinition(
    id: ID
    key: String
    version: Int
  ): ProcessDefinition

  """List process definitions"""
  processDefinitions(
    first: Int = 20
    after: String
    key: String
    name: String
    latestVersion: Boolean
    suspended: Boolean
  ): ProcessDefinitionConnection!

  """Get a process instance by ID"""
  processInstance(id: ID!): ProcessInstance

  """List process instances"""
  processInstances(
    first: Int = 20
    after: String
    definitionKey: String
    definitionId: String
    businessKey: String
    active: Boolean
    suspended: Boolean
    withIncidents: Boolean
    startedBefore: DateTime
    startedAfter: DateTime
  ): ProcessInstanceConnection!

  """Get a task by ID"""
  task(id: ID!): Task

  """List tasks"""
  tasks(
    first: Int = 20
    after: String
    assignee: String
    assigneeIn: [String!]
    candidateUser: String
    candidateGroup: String
    candidateGroups: [String!]
    unassigned: Boolean
    processInstanceId: String
    processDefinitionKey: String
    taskDefinitionKey: String
    dueBefore: DateTime
    dueAfter: DateTime
    createdBefore: DateTime
    createdAfter: DateTime
    priority: Int
    priorityHigherThanOrEquals: Int
    priorityLowerThanOrEquals: Int
    sortBy: TaskSortField
    sortOrder: SortOrder
  ): TaskConnection!

  """Get task count statistics"""
  taskCounts(
    assignee: String
    candidateUser: String
    candidateGroups: [String!]
  ): TaskCounts!

  """Get a single incident by ID. Pass includeStackTrace=true to fetch the (potentially large) stack trace."""
  incident(id: ID!, includeStackTrace: Boolean = true): Incident

  """List incidents. Stack trace is omitted by default for list responses."""
  incidents(
    first: Int = 50
    after: String
    processInstanceId: ID
    processDefinitionId: String
    processDefinitionKey: String
    incidentType: String
    activityId: String
    includeStackTrace: Boolean = false
  ): IncidentConnection!

  # -------------------------------------------------------------------------
  # Enterprise Integration Patterns
  # -------------------------------------------------------------------------

  """Get the Camel context"""
  camelContext: CamelContext!

  """Get all Camel contexts (multi-context setup)"""
  camelContexts: [CamelContext!]!

  """Get a route by ID"""
  route(id: ID!): Route

  """List routes"""
  routes(
    first: Int = 20
    after: String
    status: RouteState
    group: String
    search: String
  ): RouteConnection!

  """Get a component by name"""
  component(name: String!): Component

  """List all components"""
  components: [Component!]!

  """List route templates"""
  routeTemplates: [RouteTemplate!]!

  """Get a route template by ID"""
  routeTemplate(id: ID!): RouteTemplate

  """List endpoints"""
  endpoints(component: String): [Endpoint!]!

  """Validate a route definition"""
  validateRouteDefinition(yaml: String!): ValidationResult!

  # -------------------------------------------------------------------------
  # EIP Console — time-series stats & exchange history
  # -------------------------------------------------------------------------

  """
  Three-band exchange-count time series for the EIP Console graph panel.
  Counts are accumulated via a JCR XPath `facet accumulate` query with
  `limit=0` (the content search is skipped) over the records under
  /var/eip/history.
  """
  routeStats(
    """Route IDs to include — empty / null means all routes"""
    routes: [String!]

    """ISO-8601 from instant (inclusive)"""
    from: String!

    """ISO-8601 to instant (exclusive)"""
    to: String!

    """Status filter: completed | failed | all (default all)"""
    status: String

    """Bucket interval: 5min | 1h | 1d (default auto-resolved from range)"""
    interval: String
  ): RouteStats!

  """
  Lucene-backed list query over /var/eip/history. Returns a Relay-style
  cursor connection. Designed for at-most ~1000 rows fetched in pages of
  up to 500 by the EIP Console.
  """
  historyExchanges(
    first: Int
    after: String
    last: Int
    before: String

    """Filter by route IDs — empty / null means all routes"""
    routes: [String!]

    """Filter by status (completed | failed | all)"""
    status: String

    """ISO-8601 lower bound (inclusive) on createdAt"""
    from: String

    """ISO-8601 upper bound (exclusive) on createdAt"""
    to: String

    """Free-text filter — matches partially against businessKey, exchangeId or routeId"""
    filter: String
  ): HistoryExchangeConnection!

  """Full detail of a single exchange (Inspector view)."""
  historyExchange(exchangeId: String!): HistoryExchange
}

type Mutation {
  # -------------------------------------------------------------------------
  # Content Management
  # -------------------------------------------------------------------------

  """Create a new folder"""
  createFolder(
    path: String!
    name: String!
    nodeType: String = "nt:folder"
  ): Node!

  """Create a new file"""
  createFile(
    path: String!
    name: String!
    mimeType: String!
    content: Base64!
    nodeType: String = "nt:file"
  ): Node!

  """Delete a node"""
  deleteNode(input: DeleteNodeInput!): Boolean!

  """Rename a node"""
  renameNode(input: RenameNodeInput!): Node!

  """Lock a node"""
  lockNode(
    path: String!
    isDeep: Boolean = false
    isSessionScoped: Boolean = false
  ): Node!

  """Unlock a node"""
  unlockNode(input: UnlockNodeInput!): Boolean!

  """Set multiple properties on a node"""
  setProperties(
    path: String!
    properties: [PropertyInput!]!
  ): SetPropertiesResult!

  """Add a mixin type to a node"""
  addMixin(
    path: String!
    mixinType: String!
  ): Node!

  """Remove a mixin type from a node"""
  deleteMixin(
    path: String!
    mixinType: String!
  ): Node!

  """Set access control entries"""
  setAccessControl(
    path: String!
    principal: String
    privileges: [String!]
    allow: Boolean = true
    entries: [AccessControlEntryInput!]
  ): AccessControl!

  """Delete an access control entry"""
  deleteAccessControl(
    path: String!
    principal: String!
  ): Boolean!

  """Check in a versionable node"""
  checkin(input: CheckinInput!): Version!

  """Check out a versionable node"""
  checkout(input: CheckoutInput!): Boolean!

  """Restore a version"""
  restoreVersion(input: RestoreVersionInput!): Node!

  # -------------------------------------------------------------------------
  # Workspace Management (administrators and service accounts only)
  # -------------------------------------------------------------------------

  """
  Create a workspace. The mutation returns as soon as the JCR workspace
  exists; its CMS services are brought online asynchronously (provisioning
  and content deployment can take minutes), so the returned workspace is
  normally in the STARTING state — poll the `workspaces` query until it
  reports ONLINE. The workspace name appears in URLs and as a directory
  name, so it is restricted to lowercase letters, digits, hyphens and
  underscores, starting with a letter (max 64 characters).
  """
  createWorkspace(input: CreateWorkspaceInput!): CreateWorkspacePayload!

  """
  Delete a workspace including everything stored in it. The system
  workspace (the identity store) and the workspace the session is bound
  to cannot be deleted.
  """
  deleteWorkspace(input: DeleteWorkspaceInput!): DeleteWorkspacePayload!

  # -------------------------------------------------------------------------
  # Multipart Upload
  # -------------------------------------------------------------------------

  """
  Initiate a multipart upload session.
  Returns an upload ID to be used for subsequent chunk uploads.
  """
  initiateMultipartUpload(input: InitiateMultipartUploadInput): MultipartUploadInfo!

  """
  Append a chunk of data to an existing multipart upload.
  Data should be Base64 encoded. Chunks are typically 1MB.
  """
  appendMultipartUploadChunk(input: AppendMultipartUploadChunkInput!): MultipartUploadInfo!

  """
  Complete a multipart upload and create the file in the repository.
  If overwrite is true, existing files will be replaced.
  """
  completeMultipartUpload(input: CompleteMultipartUploadInput!): Node!

  """
  Abort a multipart upload and clean up temporary data.
  Should be called when upload is cancelled or fails.
  """
  abortMultipartUpload(input: AbortMultipartUploadInput!): Boolean!

  # -------------------------------------------------------------------------
  # Business Process Management
  # -------------------------------------------------------------------------

  """Start a new process instance"""
  startProcess(input: StartProcessInput!): ProcessInstance!

  """Suspend a process instance"""
  suspendProcessInstance(id: ID!): ProcessInstance!

  """Activate a suspended process instance"""
  activateProcessInstance(id: ID!): ProcessInstance!

  """Cancel a process instance"""
  cancelProcessInstance(
    id: ID!
    reason: String
  ): Boolean!

  """Delete a process instance"""
  deleteProcessInstance(
    id: ID!
    skipCustomListeners: Boolean = false
  ): Boolean!

  """Set variables on a process instance"""
  setProcessVariables(
    processInstanceId: ID!
    variables: [ProcessVariableInput!]!
  ): ProcessInstance!

  """Claim a task for the current user"""
  claimTask(taskId: ID!): Task!

  """Release a claimed task"""
  unclaimTask(taskId: ID!): Task!

  """Assign a task to a specific user"""
  assignTask(
    taskId: ID!
    assignee: String!
  ): Task!

  """Set task assignee (can be null to unassign)"""
  setTaskAssignee(
    taskId: ID!
    assignee: String
  ): Task!

  """Delegate a task to another user"""
  delegateTask(
    taskId: ID!
    assignee: String!
  ): Task!

  """Complete a task"""
  completeTask(input: CompleteTaskInput!): Task

  """Set variables on a task"""
  setTaskVariables(
    taskId: ID!
    variables: [ProcessVariableInput!]!
    local: Boolean = false
  ): Task!

  """Add a comment to a task"""
  addTaskComment(
    taskId: ID!
    message: String!
  ): TaskComment!

  """Deploy a process definition"""
  deployProcess(input: DeployProcessInput!): Deployment!

  """Delete a deployment"""
  deleteDeployment(
    id: ID!
    cascade: Boolean = false
  ): Boolean!

  """
  Restore retries on the Job that produced a failed-job incident.
  The Job Executor will re-run the job on its next cycle and, on success,
  the incident is auto-resolved by the engine.
  """
  setJobRetries(input: SetJobRetriesInput!): Incident

  """
  Resolve a custom incident. The engine only allows direct resolution
  for incidents created via runtimeService.createIncident; failed-job
  incidents must instead be cleared by fixing/retrying the underlying job.
  Returns true on success.
  """
  resolveIncident(id: ID!): Boolean!

  """Attach an operator annotation to an incident (set null/empty to clear)."""
  setIncidentAnnotation(input: SetIncidentAnnotationInput!): Incident

  """
  Build a migration plan from a source to a target process definition
  and return it as a preview (instructions list). The plan is in-memory
  and is not applied until migrateProcessInstance is invoked.
  """
  createMigrationPlan(input: CreateMigrationPlanInput!): MigrationPlan!

  """
  Migrate process instances of the source definition to the target
  definition. Execution is always async — the server queues a CMS
  JobManager job that, on its worker thread, seeds a Camunda batch and
  republishes its progress through the generic `jobProgress(jobId)`
  subscription. The mutation returns the CMS job id (not the Camunda
  batch id) so the client can subscribe immediately, plus an
  `abortable` flag so it can hide the Abort button when the underlying
  engine cannot safely cancel the work (always false for Camunda 7).
  """
  migrateProcessInstance(input: MigrateProcessInstanceInput!): MigrationJob!

  # -------------------------------------------------------------------------
  # Enterprise Integration Patterns
  # -------------------------------------------------------------------------

  """Start a route"""
  startRoute(input: StartRouteInput!): Route!

  """Stop a route"""
  stopRoute(input: StopRouteInput!): Route!

  """Suspend a route"""
  suspendRoute(input: SuspendRouteInput!): Route!

  """Resume a suspended route"""
  resumeRoute(input: ResumeRouteInput!): Route!

  """Create a new route"""
  createRoute(input: CreateRouteInput!): Route!

  """Update an existing route"""
  updateRoute(input: UpdateRouteInput!): Route!

  """Delete a route"""
  deleteRoute(id: ID!): Boolean!

  """Create a route from a template"""
  createRouteFromTemplate(
    templateId: ID!
    routeId: String!
    parameters: JSON
  ): Route!

  """Start all routes"""
  startAllRoutes: [Route!]!

  """Stop all routes"""
  stopAllRoutes(timeout: Int): [Route!]!

  """Start the Camel context"""
  startCamelContext: CamelContext!

  """Stop the Camel context"""
  stopCamelContext(timeout: Int): CamelContext!

  """Suspend the Camel context"""
  suspendCamelContext(timeout: Int): CamelContext!

  """Resume the Camel context"""
  resumeCamelContext: CamelContext!

  """Reset statistics for a route"""
  resetRouteStatistics(id: ID!): Route!

  """Reset all statistics"""
  resetAllStatistics: CamelContext!

  """Send a test message to an endpoint (debugging)"""
  sendToEndpoint(input: SendToEndpointInput!): ExchangeResult!

  """Enable tracing"""
  enableTracing: CamelContext!

  """Disable tracing"""
  disableTracing: CamelContext!
}
