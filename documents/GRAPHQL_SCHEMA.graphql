  | StringPropertyValue
  | StringPropertyValueArray
  | LongPropertyValue
  | LongPropertyValueArray
  | DoublePropertyValue
  | DoublePropertyValueArray
  | DecimalPropertyValue
  | DecimalPropertyValueArray
  | BooleanPropertyValue
  | BooleanPropertyValueArray
  | DatePropertyValue
  | DatePropertyValueArray
  | BinaryPropertyValue
  | BinaryPropertyValueArray
  | NamePropertyValue
  | NamePropertyValueArray
  | PathPropertyValue
  | PathPropertyValueArray
  | ReferencePropertyValue
  | ReferencePropertyValueArray
  | WeakreferencePropertyValue
  | WeakreferencePropertyValueArray
  | UriPropertyValue
  | UriPropertyValueArray

type StringPropertyValue {
  type: String!
  value: String!
}

type StringPropertyValueArray {
  type: String!
  values: [String!]!
}

type LongPropertyValue {
  type: String!
  value: Long!
}

type LongPropertyValueArray {
  type: String!
  values: [Long!]!
}

type DoublePropertyValue {
  type: String!
  value: Float!
}

type DoublePropertyValueArray {
  type: String!
  values: [Float!]!
}

type DecimalPropertyValue {
  type: String!
  value: String!
}

type DecimalPropertyValueArray {
  type: String!
  values: [String!]!
}

type BooleanPropertyValue {
  type: String!
  value: Boolean!
}

type BooleanPropertyValueArray {
  type: String!
  values: [Boolean!]!
}

type DatePropertyValue {
  type: String!
  value: DateTime!
}

type DatePropertyValueArray {
  type: String!
  values: [DateTime!]!
}

type BinaryPropertyValue {
  type: String!
  mimeType: String
  size: Long
  value: Base64!
}

type BinaryPropertyValueArray {
  type: String!
  mimeTypes: [String]!
  sizes: [Long]!
}

type NamePropertyValue {
  type: String!
  value: String!
}

type NamePropertyValueArray {
  type: String!
  values: [String!]!
}

type PathPropertyValue {
  type: String!
  value: String!
}

type PathPropertyValueArray {
  type: String!
  values: [String!]!
}

type ReferencePropertyValue {
  type: String!
  value: String!
}

type ReferencePropertyValueArray {
  type: String!
  values: [String!]!
}

type WeakreferencePropertyValue {
  type: String!
  value: String!
}

type WeakreferencePropertyValueArray {
  type: String!
  values: [String!]!
}

type UriPropertyValue {
  type: String!
  value: String!
}

type UriPropertyValueArray {
  type: String!
  values: [String!]!
}

# -----------------------------------------------------------------------------
# Property Value Input
# -----------------------------------------------------------------------------

"""
Input for a single item in a binary array property.
Specify exactly ONE field: keepIndex to retain an existing server value, or uploadId for a new upload.
"""
input BinaryArrayItemInput {
  """Index of the existing server value to retain"""
  keepIndex: Int
  """Upload ID of a newly uploaded file"""
  uploadId: String
}

"""
Input for setting property values.
Specify exactly ONE field. Multiple fields will cause a validation error.
"""
input PropertyValueInput {
  stringValue: String
  stringArrayValue: [String!]
  longValue: Long
  longArrayValue: [Long!]
  doubleValue: Float
  doubleArrayValue: [Float!]
  decimalValue: String
  decimalArrayValue: [String!]
  booleanValue: Boolean
  booleanArrayValue: [Boolean!]
  dateValue: DateTime
  dateArrayValue: [DateTime!]
  binaryValue: Base64
  binaryUploadId: String
  binaryArrayUploadIds: [String!]
  binaryArrayItems: [BinaryArrayItemInput!]
  nameValue: String
  nameArrayValue: [String!]
  pathValue: String
  pathArrayValue: [String!]
  referenceValue: String
  referenceArrayValue: [String!]
  weakReferenceValue: String
  weakReferenceArrayValue: [String!]
  uriValue: String
  uriArrayValue: [String!]
}

"""Property input for setProperties mutation"""
input PropertyInput {
  name: String!
  value: PropertyValueInput!
}

# -----------------------------------------------------------------------------
# Node Connection (Relay-style)
# -----------------------------------------------------------------------------

type NodeConnection {
  edges: [NodeEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type NodeEdge {
  node: Node!
  cursor: String!
}

# -----------------------------------------------------------------------------
# Webtop Applications
# -----------------------------------------------------------------------------

"""
A Webtop application, derived from its `app.yml` descriptor (plus the sibling
`icon.svg` / `index.html` resources). Returned by the `apps` query so the
client can load the full app catalog in a single round trip.
"""
type App {
  """Stable app id (the `identifier` field of app.yml)."""
  identifier: String
  """Directory name of the app under the apps root."""
  name: String!
  """Display title."""
  title: String
  """
  Icon reference. The explicit `app.yml` `icon` value, or `"icon.svg"` when a
  sibling icon.svg exists, otherwise null.
  """
  icon: String
  """Absolute repository path of the app directory."""
  path: String!
  """Path of the app directory relative to the apps root."""
  relPath: String!
  """ISO-8601 last-modified time (from index.html, then the descriptor)."""
  modified: String
  """Whether the app can open content (acts as an editor)."""
  editor: Boolean
  """MIME-type patterns this app can open (e.g. "text/*")."""
  contentTypes: [String!]
  """Whether the app appears in the start menu (null = default visible)."""
  enableStartMenu: Boolean
  """Whether the app is only visible to administrators."""
  isAdminOnly: Boolean
  """Whether only a single instance may run at a time."""
  singleton: Boolean
  """Whether the app renders its own window controls."""
  customWindowControls: Boolean
  """Minimum window width in pixels."""
  minimumWidth: Int
  """Minimum window height in pixels."""
  minimumHeight: Int
  """Declared app actions."""
  actions: [AppAction!]!
}

"""A named action declared in an app's `app.yml` `actions` map."""
type AppAction {
  """The action key from the actions map."""
  identifier: String!
  label: String
  title: String
  icon: String
  handler: String
}

type AppConnection {
  edges: [AppEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type AppEdge {
  node: App!
  cursor: String!
}

# -----------------------------------------------------------------------------
# Workspaces
# -----------------------------------------------------------------------------

"""
A repository workspace. Identity (users, groups, roles) always lives in
the system workspace; content workspaces hold everything else, each with
its own database, search index, schemas, process engine and integration
engine.
"""
type Workspace {
  """Workspace name; also the URL segment the workspace is served under"""
  name: String!

  """Whether this is the workspace the queried endpoint is bound to"""
  current: Boolean!

  """Whether this is the system workspace (the identity store)"""
  system: Boolean!

  """Lifecycle state of the workspace's CMS services on this node"""
  state: WorkspaceState!

  """
  When `state` is FAILED, the reason the services failed to start (so the UI
  can show why without a trip to the server log); null otherwise.
  """
  stateMessage: String

  """State of the workspace's process engine (Camunda)"""
  processEngine: WorkspaceEngine!

  """State of the workspace's integration engine (Apache Camel)"""
  integrationEngine: WorkspaceEngine!
}

"""
Lifecycle state of a workspace's CMS services. The JCR workspace itself
is open in either state — a workspace that is not open is not listed.
"""
enum WorkspaceState {
  """The workspace's CMS services are running"""
  ONLINE

  """
  The CMS services are not running yet: startup is still in progress — e.g.
  a freshly created workspace, or one just discovered on another cluster
  node
  """
  STARTING

  """
  The CMS services failed to start; the workspace will not come up without
  intervention. `stateMessage` carries the reason. Cleared when the
  workspace is (re)started or deleted.
  """
  FAILED
}

"""
State of a per-workspace engine (process engine / integration engine).
`enabled` is the configuration switch (bpm.yml / eip.yml), `running` is
the actual state: enabled but not running means the engine failed to
start. `enabled` is null while the workspace's services are not running
(the configuration has not been read).
"""
type WorkspaceEngine {
  enabled: Boolean
  running: Boolean!
}

input CreateWorkspaceInput {
  """
  Workspace name: lowercase letters, digits, hyphens and underscores,
  starting with a letter (max 64 characters)
  """
  name: String!
}

type WorkspaceMutationError {
  field: String
  message: String!
  code: String!
}

"""
Result of starting a workspace creation. Creation runs as a background job
(provisioning and content deployment can take minutes and either step can
fail), so the mutation returns a `jobId` to watch via `jobProgress(jobId)`
for the `creating`/`starting` phases and the terminal COMPLETED/FAILED
event. `errors` is non-null only for synchronous validation failures
(privileges, name, already exists), in which case `jobId` is null.
"""
type CreateWorkspacePayload {
  """Id of the background job performing the creation; null on validation error"""
  jobId: String
  """Initial job status (queued) when accepted; null on validation error"""
  status: String
  errors: [WorkspaceMutationError!]
}

input DeleteWorkspaceInput {
  name: String!
}

"""
Result of starting a workspace deletion. Deletion runs as a background job
(it stops the workspace's services and waits for them to come fully down
before removing the directory — the `stopping` then `deleting` phases), so
the mutation returns a `jobId` to watch via `jobProgress(jobId)`. `errors`
is non-null only for synchronous validation failures, in which case `jobId`
is null.
"""
type DeleteWorkspacePayload {
  """Id of the background job performing the deletion; null on validation error"""
  jobId: String
  """Initial job status (queued) when accepted; null on validation error"""
  status: String
  """The workspace being deleted; echoed back for the caller's convenience"""
  name: String
  errors: [WorkspaceMutationError!]
}

# -----------------------------------------------------------------------------
# Cluster
# -----------------------------------------------------------------------------

"""
Cluster topology of the queried workspace. In standalone deployments
`enabled` is false and `members` is empty, so a client can state
"running as a single node" instead of showing an empty cluster.
"""
type Cluster {
  """Whether this node runs as part of a cluster"""
  enabled: Boolean!

  """Identifier of the node serving the request"""
  nodeId: String

  """Registered members; empty in standalone deployments"""
  members: [ClusterMember!]!
}

"""A repository node registered in the cluster"""
type ClusterMember {
  """Identifier under which the node appears in the cluster"""
  nodeId: String!

  """Host name of the node, when it could be determined"""
  hostName: String

  """When the node joined, in milliseconds since the epoch"""
  started: Long!

  """The node's last heartbeat, in milliseconds since the epoch"""
  lastHeartbeat: Long!

  """
  The cluster coordinator's heartbeat-freshness judgement: a member whose
  heartbeat went stale is presumed dead (crashed, lost its database
  connection, or partitioned away). Clients must not re-derive this from
  lastHeartbeat — the staleness policy is owned by the server.
  """
  alive: Boolean!

  """Whether this member is the node that served the request"""
  self: Boolean!
}

# -----------------------------------------------------------------------------
# Version History
# -----------------------------------------------------------------------------

type VersionHistory {
  """All versions of this node"""
  versions: [Version!]!

  """Current base version"""
  baseVersion: Version

  """UUID of the versionable node"""
  versionableUuid: String!
}

type Version {
  """Version name (e.g., "1.0", "1.1")"""
  name: String!

  """When this version was created"""
  created: DateTime!

  """Predecessor version names"""
  predecessors: [String!]!

  """Successor version names"""
  successors: [String!]!

  """Path to the frozen node snapshot"""
  frozenNodePath: String!
}

# -----------------------------------------------------------------------------
# Access Control
# -----------------------------------------------------------------------------

type AccessControl {
  entries: [AccessControlEntry!]!
}

type Principal {
  """Principal identifier (user or group name)"""
  id: ID!

  """Display name"""
  displayName: String

  """Whether this principal is a group"""
  isGroup: Boolean!
}

type AccessControlEntry {
  """Principal (user or group)"""
  principal: Principal!

  """Granted privileges (e.g., jcr:read, jcr:write)"""
  privileges: [String!]!

  """Whether access is allowed (MintJams extended ACL)"""
  allow: Boolean!
}

input AccessControlEntryInput {
  principal: String!
  privileges: [String!]!
  allow: Boolean = true
}

input DeleteNodeInput {
  path: String!
}

input RenameNodeInput {
  path: String!
  name: String!
}

input UnlockNodeInput {
  path: String!
}

input CheckinInput {
  path: String!
}

input CheckoutInput {
  path: String!
}

input RestoreVersionInput {
  path: String!
  versionName: String!
}

input CreateFolderInput {
  path: String!
  name: String!
  nodeType: String = "nt:folder"
}

input CreateFileInput {
  path: String!
  name: String!
  mimeType: String!
  content: Base64!
  nodeType: String = "nt:file"
}

input InitiateMultipartUploadInput {
  "Reserved for future use"
  _placeholder: String
}

input AppendMultipartUploadChunkInput {
  uploadId: String!
  data: Base64!
}

input CompleteMultipartUploadInput {
  uploadId: String!
  path: String!
  name: String!
  mimeType: String!
  overwrite: Boolean = false
}

input AbortMultipartUploadInput {
  uploadId: String!
}

# -----------------------------------------------------------------------------
# Mutation Results
# -----------------------------------------------------------------------------

type SetPropertiesResult {
  node: Node
  errors: [PropertyError!]!
}

type PropertyError {
  propertyName: String!
  message: String!
}

"""Multipart upload session info"""
type MultipartUploadInfo {
  """Upload session ID"""
  uploadId: String!
  """Total bytes uploaded so far"""
  totalSize: Long!
}

# =============================================================================
# BUSINESS PROCESS MANAGEMENT (Camunda BPM)
# =============================================================================

# -----------------------------------------------------------------------------
# Process Definition
# -----------------------------------------------------------------------------

"""BPMN Process Definition"""
type ProcessDefinition {
  id: ID!

  """Process definition key (from BPMN)"""
  key: String!

  """Human-readable name"""
  name: String

  """Process description"""
  description: String

  """Version number (incremented on re-deployment)"""
  version: Int!

  """Deployment this definition belongs to"""
  deploymentId: String!

  """BPMN resource file name"""
  resourceName: String

  """Diagram resource file name (if available)"""
  diagramResourceName: String

  """Whether the definition is suspended"""
  suspended: Boolean!

  """Tenant identifier for multi-tenancy"""
  tenantId: String

  """Category for organizing definitions"""
  category: String

  """Form key for the start event (if defined)"""
  startFormKey: String

  # Relations
  """Active/historical process instances"""
  instances(
    first: Int = 20
    after: String
    active: Boolean
  ): ProcessInstanceConnection!
}

type ProcessDefinitionConnection {
  edges: [ProcessDefinitionEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ProcessDefinitionEdge {
  node: ProcessDefinition!
  cursor: String!
}

# -----------------------------------------------------------------------------
# Process Instance
# -----------------------------------------------------------------------------

"""Running or completed process instance"""
type ProcessInstance {
  id: ID!

  """Process definition ID"""
  definitionId: String!

  """Process definition key"""
  definitionKey: String!

  """Business key for correlation"""
  businessKey: String

  """Related case instance ID (CMMN)"""
  caseInstanceId: String

  """Whether the instance is suspended"""
  suspended: Boolean!

  """Whether the instance has ended"""
  ended: Boolean!

  """Tenant identifier"""
  tenantId: String

  # Time information
  """When the process was started"""
  startTime: DateTime!

  """When the process ended (if ended)"""
  endTime: DateTime

  """Total duration in milliseconds"""
  durationInMillis: Long

  # Relations
  """Process definition"""
  definition: ProcessDefinition!

  """Process variables"""
  variables: [ProcessVariable!]!

  """Active and completed tasks"""
  tasks(first: Int = 20, after: String): TaskConnection!

  """Activity instance history"""
  activityInstances: [ActivityInstance!]!

  """Number of active incidents"""
  incidentCount: Int!
}

type ProcessInstanceConnection {
  edges: [ProcessInstanceEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ProcessInstanceEdge {
  node: ProcessInstance!
  cursor: String!
}

# -----------------------------------------------------------------------------
# Incident
# -----------------------------------------------------------------------------

"""
An incident raised by the BPM engine — typically a failed job, failed
external task, or a custom incident created by application code.
"""
type Incident {
  id: ID!

  """Camunda incident type: "failedJob", "failedExternalTask", or a custom code"""
  type: String!

  """Human-readable error message"""
  message: String

  """When the incident was raised"""
  incidentTimestamp: DateTime!

  """Activity ID where the incident occurred (BPMN element ID)"""
  activityId: String

  """Activity display name resolved from the BPMN model (best effort)"""
  activityName: String

  """Execution ID where the incident occurred"""
  executionId: String

  """Owning process instance"""
  processInstanceId: ID!

  """Process definition that produced the incident"""
  processDefinitionId: String!

  """Process definition key for grouping"""
  processDefinitionKey: String

  """
  Underlying Job ID for failedJob incidents (== incident.configuration).
  Null for non-job incidents.
  """
  jobId: String

  """Remaining retries on the underlying Job (0 for non-job incidents)"""
  jobRetries: Int!

  """Direct cause incident ID, if this is a chained incident"""
  causeIncidentId: String

  """Root cause incident ID for chained incidents"""
  rootCauseIncidentId: String

  """Raw configuration value (engine-defined; for failedJob this is the Job ID)"""
  configuration: String

  """Operator-set annotation describing intent or follow-up"""
  annotation: String

  """
  Full exception stack trace from the underlying Job.
  Only populated when explicitly requested (large payload).
  """
  stackTrace: String

  """Tenant identifier"""
  tenantId: String
}

type IncidentConnection {
  edges: [IncidentEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type IncidentEdge {
  node: Incident!
  cursor: String!
}

# -----------------------------------------------------------------------------
# Task
# -----------------------------------------------------------------------------

"""User task requiring human interaction"""
type Task {
  id: ID!

  """Task name from BPMN"""
  name: String!

  """Task description"""
  description: String

  """Assigned user ID"""
  assignee: String

  """Task owner (delegator)"""
  owner: String

  """When the task was created"""
  created: DateTime!

  """Due date"""
  due: DateTime

  """Follow-up date"""
  followUp: DateTime

  """Priority (higher = more important)"""
  priority: Int!

  """Whether the task is suspended"""
  suspended: Boolean!

  # Process context
  processInstanceId: String!
  processDefinitionId: String!
  processDefinitionKey: String!
  executionId: String!
  taskDefinitionKey: String!

  # Form (using formKey-only approach)
  """Form key referencing external form in CMS"""
  formKey: String

  # Relations
  """Parent process instance"""
  processInstance: ProcessInstance!

  """Process-scoped variables accessible to this task"""
  variables: [ProcessVariable!]!

  """Task-local variables"""
  localVariables: [ProcessVariable!]!

  """Users who can claim this task"""
  candidateUsers: [String!]!

  """Groups whose members can claim this task"""
  candidateGroups: [String!]!

  """Task comments"""
  comments: [TaskComment!]!
}

type TaskConnection {
  edges: [TaskEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type TaskEdge {
  node: Task!
  cursor: String!
}

"""Task sort field options"""
enum TaskSortField {
  ID
  NAME
  ASSIGNEE
  CREATED
  DUE
  FOLLOW_UP
  PRIORITY
  PROCESS_INSTANCE_ID
}

"""Task statistics summary"""
type TaskCounts {
  """Total tasks matching criteria"""
  total: Int!

  """Tasks without assignee"""
  unassigned: Int!

  """Tasks with assignee"""
  assigned: Int!

  """Tasks past due date"""
  overdue: Int!

  """Tasks due today"""
  dueToday: Int!

  """Tasks due within this week"""
  dueThisWeek: Int!
}

# -----------------------------------------------------------------------------
# Process Variable
# -----------------------------------------------------------------------------

"""Process or task variable"""
type ProcessVariable {
  """Variable name"""
  name: String!

  """Variable type (string, long, boolean, etc.)"""
  type: String!

  """Variable value"""
  value: JSON

  """Additional type information"""
  valueInfo: JSON
}

input ProcessVariableInput {
  name: String!
  type: String
  value: JSON!
  valueInfo: JSON
}

# -----------------------------------------------------------------------------
