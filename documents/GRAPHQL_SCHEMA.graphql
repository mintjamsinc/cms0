# =============================================================================
# CMS0 GraphQL Schema Definition Language (SDL)
# =============================================================================
# Version: 1.0.0
# Last Updated: 2025-11
#
# This schema defines the complete GraphQL API for the CMS0 content management
# system, including:
# - Content Management (JCR-based)
# - Business Process Management (Camunda BPM)
# - Enterprise Integration Patterns (Apache Camel)
# - Real-time Subscriptions (SSE-based)
# =============================================================================

# -----------------------------------------------------------------------------
# Scalars
# -----------------------------------------------------------------------------

"""ISO-8601 formatted date-time string in UTC"""
scalar DateTime

"""64-bit integer"""
scalar Long

"""Arbitrary JSON object"""
scalar JSON

"""Base64 encoded binary data"""
scalar Base64

# -----------------------------------------------------------------------------
# Common Types
# -----------------------------------------------------------------------------

"""Relay-style pagination info"""
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

"""Sort order direction"""
enum SortOrder {
  ASC
  DESC
}

# -----------------------------------------------------------------------------
# Error Handling
# -----------------------------------------------------------------------------

"""
Error extensions providing additional context.
The level of detail depends on the environment configuration:
- Production: code, reason only
- Development: includes details, stackTrace
"""
type ErrorExtensions {
  """Machine-readable error code"""
  code: String!

  """High-level reason for the error"""
  reason: String

  """Affected resource identifier"""
  resourceId: String

  """Additional error details (development only)"""
  details: JSON

  """Stack trace (development only)"""
  stackTrace: String
}

# =============================================================================
# CONTENT MANAGEMENT (JCR)
# =============================================================================

# -----------------------------------------------------------------------------
# Node Types
# -----------------------------------------------------------------------------

"""JCR Node representation"""
type Node {
  """Node path in the repository"""
  path: String!

  """Node name (last segment of path)"""
  name: String!

  """Primary node type (e.g., nt:file, nt:folder)"""
  nodeType: String!

  """UUID if node has mix:referenceable"""
  uuid: String

  # Timestamps
  created: DateTime!
  createdBy: String!
  modified: DateTime!
  modifiedBy: String!

  # File-specific fields (nt:file)
  """MIME type for file nodes"""
  mimeType: String

  """File size in bytes"""
  size: Long

  """Character encoding for text files"""
  encoding: String

  """Download URL path"""
  downloadUrl: String

  """Whether the server evaluates this file through a script engine when served (e.g. .gsp)"""
  scriptable: Boolean

  """How this file is rendered when served over the web (template binding, source/output extensions)"""
  webRender: WebRender

  # Folder-specific fields (nt:folder)
  """Whether folder has child nodes"""
  hasChildren: Boolean

  # Lock information
  isLocked: Boolean
  lockOwner: String
  isDeep: Boolean
  isSessionScoped: Boolean
  isLockOwningSession: Boolean

  # Properties
  """All non-jcr: prefixed properties"""
  properties: [Property!]!

  # Search result score (only in search results)
  """Relevance score (search results only)"""
  score: Float

  # Relations
  """Child nodes with pagination"""
  children(first: Int = 20, after: String): NodeConnection!

  """Parent node"""
  parent: Node

  """Version history (if mix:versionable)"""
  versionHistory: VersionHistory
}

"""Node property"""
type Property {
  name: String!
  propertyValue: PropertyValue!
}

"""
How a file node is rendered when served over the web. The server resolves the
template binding from the file's own web.template property or, failing that, the
nearest ancestor folder's .web.yml descriptor, so clients do not have to.
"""
type WebRender {
  """Whether the file is bound to a template and is therefore served as rendered output"""
  templated: Boolean!

  """Whether the binding comes from a folder .web.yml descriptor rather than a per-file web.template property"""
  fromDescriptor: Boolean!

  """The source extension the file name carries (e.g. "md"), or null if it carries none"""
  source: String

  """Allowed output extensions (e.g. ["html", "rss"]); empty means any"""
  outputs: [String!]!
}

