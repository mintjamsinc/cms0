defaultNodes:
  - path: /
    primaryType: mi:root
    acl:
      - group: everyone
        privileges: jcr:read, jcr:readAccessControl, jcr:lockManagement, jcr:versionManagement, jcr:nodeTypeManagement
        effect: allow
      - user: anonymous
        privileges: jcr:all
        effect: deny

# Workspace database. When omitted, the workspace uses an embedded H2
# database under <workspace>/var/jcr/data. For a clustered deployment,
# point every node at the same shared database. ${...} variables
# (e.g. ${workspace.home}, ${workspace.name}, ${repository.home},
# system / OSGi framework properties) are substituted.
#
# Supported databases: H2 (embedded or server mode), PostgreSQL.
# For PostgreSQL, install the driver bundle and set driverClassName.
#
#datasource:
#  jdbcURL: jdbc:postgresql://db:5432/jcr_${workspace.name}
#  username: jcr
#  password: secret
#  driverClassName: org.postgresql.Driver

# Binary (blob) storage. When omitted, blobs are stored as files under
# <workspace>/var/jcr/bin. For a clustered deployment, the directory must
# resolve to storage shared by all nodes.
#
#blobstore:
#  type: fs
#  directory: ${workspace.home}/var/jcr/bin

# Full-text search index. The index is node-local: in a clustered
# deployment every node maintains its own index. When the workspace
# directory itself lives on shared storage and indexPath is not set,
# each node automatically uses <workspace>/var/search/nodes/<nodeId>.
# Point indexPath at fast node-local storage for best performance.
#
#search:
#  indexPath: /var/lib/cms/search/${workspace.name}
