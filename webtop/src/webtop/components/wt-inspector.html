<template id="wt-inspector">
	<!--
	  The Inspector custom element. The host renders an outer
	  `.detail-resize-handle` and passes the resolved target plus a
	  minimal API surface; everything below is self-contained.

	  REFERENCE/WEAKREFERENCE/BINARY drop zones inside this panel use their
	  own @drop.stop + @dragover.stop, so those inner drops bypass the
	  panel-level forbidden handler via bubble-phase stopPropagation.
	-->
	<div class="detail-panel island p-0"
		:style="width ? { width: width + 'px' } : null"
		@mounted.stop="onMounted"
		@unmount.stop="onUnmount"
		@dragover.prevent.stop @drop.prevent.stop>

		<!-- Panel Header -->
		<div class="detail-panel-header">
			<span class="detail-panel-title">Inspector</span>
		</div>

		<!-- Regular Inspector view (hidden while any sub-view overlay is open) -->
		<template v-if="!detailVersionHistoryVisible && !detailACLEditorVisible && !detailPropertyEditorVisible">

		<!-- No Selection State -->
		<div v-if="!singleTarget && multiTargets.length === 0" class="detail-panel-empty">
			<i class="bi bi-cursor-text"></i>
			<span>Select an item to view details</span>
		</div>

		<!-- Multi-Selection State -->
		<div v-else-if="multiTargets.length > 1" class="detail-panel-multi">
			<i class="bi bi-collection"></i>
			<span>{{ multiTargets.length }} items selected</span>
			<div class="detail-panel-multi-summary">
				<span v-if="selectedFolderCount > 0">{{ selectedFolderCount }} folder(s)</span>
				<span v-if="selectedFileCount > 0">{{ selectedFileCount }} file(s)</span>
				<span v-if="selectedTotalSize > 0">{{ displayTotalSize }}</span>
			</div>
		</div>

		<!-- Single Selection State -->
		<div v-else class="detail-panel-content">

			<!-- Section 1: Preview (no header) -->
			<div class="detail-preview-area">
				<img v-if="isSelectedItemImage" :src="selectedItemPreviewURL"
					class="detail-preview-image" @error="onPreviewImageError" />
				<div v-else class="detail-preview-icon">
					<i :class="[getFileIcon(singleTarget), getFileIconClass(singleTarget), 'detail-preview-icon-large']"></i>
					<span class="detail-preview-type">{{ displayType(singleTarget) }}</span>
				</div>
			</div>

			<!-- Section 2: Basic Info -->
			<div class="detail-section-header">Info</div>

			<div class="detail-section-body">
				<div class="detail-section">
					<div class="detail-label">Name</div>
					<div class="detail-value text-break">{{ singleTarget.name }}</div>
				</div>

				<div class="detail-section">
					<div class="detail-label">Type</div>
					<!-- MIME type inline editor (suggestions popup is shown by the shell) -->
					<div v-if="mimeTypeEditing" class="mime-type-editor">
						<div class="input-group">
							<input type="text" v-model="mimeTypeInput" class="mime-type-editor-input"
								@input="updateMimeTypeSuggestions"
								@keydown="handleMimeTypeKeydown"
								:disabled="mimeTypeSaving"
								placeholder="e.g. text/plain" />
							<div class="input-group-actions">
								<button class="input-group-btn" @click="confirmMimeTypeEdit"
									:disabled="mimeTypeSaving || !mimeTypeInput.trim()"
									title="Confirm">
									<i class="bi bi-check-lg"></i>
								</button>
								<button class="input-group-btn" @click="cancelMimeTypeEdit"
									:disabled="mimeTypeSaving" title="Cancel">
									<i class="bi bi-x-lg"></i>
								</button>
							</div>
						</div>
					</div>
					<!-- Display mode -->
					<div v-else class="detail-value mime-type-clickable"
						:class="{ 'mime-type-disabled': singleTarget.isCollection }"
						@click="startMimeTypeEdit"
						:title="singleTarget.isCollection ? '' : 'Click to change MIME type'">
						{{ displayType(singleTarget) }}
					</div>
				</div>

				<div v-if="!singleTarget.isCollection" class="detail-section">
					<div class="detail-label">Encoding</div>
					<!-- Encoding inline editor (suggestions popup is shown by the shell) -->
					<div v-if="encodingEditing" class="mime-type-editor">
						<div class="input-group">
							<input type="text" v-model="encodingInput" class="mime-type-editor-input encoding-editor-input"
								@input="updateEncodingSuggestions"
								@keydown="handleEncodingKeydown"
								:disabled="encodingSaving"
								placeholder="e.g. UTF-8" />
							<div class="input-group-actions">
								<button class="input-group-btn" @click="confirmEncodingEdit"
									:disabled="encodingSaving"
									title="Confirm">
									<i class="bi bi-check-lg"></i>
								</button>
								<button class="input-group-btn" @click="cancelEncodingEdit"
									:disabled="encodingSaving" title="Cancel">
									<i class="bi bi-x-lg"></i>
								</button>
							</div>
						</div>
					</div>
					<!-- Display mode -->
					<div v-else class="detail-value mime-type-clickable"
						@click="startEncodingEdit"
						title="Click to change encoding">
						<span v-if="singleTarget.encoding">{{ displayEncoding(singleTarget) }}</span>
						<span v-else class="text-muted">&mdash;</span>
					</div>
				</div>

				<div class="detail-section">
					<div class="detail-label">Size</div>
					<div v-if="!singleTarget.isCollection" class="detail-value">{{ displaySize(singleTarget) }}</div>
					<div v-else class="detail-muted-value">&mdash;</div>
				</div>

				<div class="detail-section">
					<div class="detail-label">Path</div>
					<div class="detail-value text-break d-flex align-items-start" style="word-break: break-all;">
						<span class="flex-grow-1">{{ singleTarget.path }}</span>
						<button class="detail-inline-btn ms-1 flex-shrink-0" @click="copyPathToClipboard(event)" title="Copy path">
							<i class="bi bi-clipboard"></i>
						</button>
					</div>
				</div>

				<div class="detail-section">
					<div class="detail-label">Created</div>
					<div class="detail-value">{{ formatDetailDate(singleTarget.created) }}</div>
					<div class="detail-value">{{ singleTarget.createdByDisplayName || singleTarget.createdBy || '—' }}</div>
				</div>

				<div class="detail-section">
					<div class="detail-label">Modified</div>
					<div class="detail-value">{{ formatDetailDate(singleTarget.lastModified) }}</div>
					<div class="detail-value">{{ singleTarget.lastModifiedByDisplayName || singleTarget.lastModifiedBy || '—' }}</div>
				</div>

				<div class="detail-section">
					<div class="detail-label">Lock Status</div>
					<div class="detail-value">
						<span v-if="singleTarget.isLocked" class="lock-chip"
							:class="singleTarget.lockInfo?.isLockOwner ? 'lock-chip-self' : 'lock-chip-other'">
							<i class="bi bi-lock-fill me-1"></i>
							<span v-if="singleTarget.lockInfo?.isLockOwner" class="lock-chip-label">Locked by you</span>
							<span v-else class="lock-chip-label">Locked by {{ singleTarget.lockInfo?.lockOwnerDisplayName || singleTarget.lockInfo?.lockOwner }}</span>
						</span>
						<span v-else class="text-muted">&mdash;</span>
					</div>
				</div>

				<div v-if="singleTarget.isVersionable" class="detail-section">
					<div class="detail-label">Version</div>
					<div class="detail-value">
						<span>{{ displayVersion(singleTarget) }}</span>
						<button class="detail-inline-btn ms-1" @click="showDetailVersionHistory" title="Version History">
							<i class="bi bi-clock-history"></i>
						</button>
						<span v-if="singleTarget.isCheckedOut" class="detail-status-badge detail-status-checkedout ms-1">
							Checked Out
						</span>
					</div>
				</div>

				<div class="detail-section">
					<div class="detail-label">Referenceable</div>
					<div class="detail-value">
						<span v-if="singleTarget.isReferenceable">Yes <small class="text-muted ms-1">(UUID: {{ singleTarget.id }})</small></span>
						<span v-else class="text-muted">No</span>
					</div>
				</div>
			</div>

			<!-- Section 3: Properties -->
			<div class="detail-section-header">
				Properties
				<button class="detail-section-header-btn ms-auto" @click="showDetailPropertyEditor" title="Edit Properties">
					<i class="bi bi-pencil"></i>
				</button>
			</div>

			<div class="detail-section-body">
				<div v-if="detailPropertiesLoading" class="detail-section text-center py-3">
					<span class="spinner-border spinner-border-sm"></span>
				</div>
				<div v-else-if="detailProperties.length === 0" class="detail-section text-muted small">
					No custom properties
				</div>
				<template v-else>
					<!-- Schema selector -->
					<div v-if="availableSchemas.length > 0" class="schema-selector">
						<div class="wt-select detail-schema-dropdown">
							<button type="button" class="wt-select-trigger" @click.stop="openDetailSchemaDropdown(event)">
								<span class="wt-select-value" :class="{placeholder: !selectedSchemaKey}">
									{{ detailSchemaLabel() || '— No schema —' }}
								</span>
								<i class="bi bi-chevron-down wt-select-chevron"></i>
							</button>
						</div>
					</div>

					<!-- Property filter -->
					<div class="property-filter">
						<input type="text" class="wt w-100" v-model="detailPropertiesFilter" placeholder="Filter properties...">
					</div>

					<!-- Schema view: schema-ordered properties + extras -->
					<div v-if="selectedSchemaKey && filteredSchemaDisplayProperties.schemaProps.length + filteredSchemaDisplayProperties.extraProps.length > 0" class="custom-properties">
						<div v-for="prop in filteredSchemaDisplayProperties.schemaProps" :key="'s_' + prop.name" class="detail-section">
							<div class="detail-label detail-prop-label">
								<span class="detail-prop-name">{{ prop.schemaLabel }}</span>
								<div class="detail-prop-badges">
									<span v-if="prop.type === 'DATE'" class="prop-tz-badge">{{ localTZ }}</span>
									<span class="prop-type-badge">{{ prop.isArray ? prop.type + '[]' : prop.type }}</span>
								</div>
							</div>
							<!-- Format error -->
							<div v-if="prop.formatError" class="detail-value schema-format-error" :title="prop.formatError">
								<i class="bi bi-exclamation-triangle-fill"></i> {{ prop.formatError }}
							</div>
							<!-- Formatted value from display format -->
							<div v-else-if="prop.formattedValue != null" class="detail-value text-break text-clamp-4" :class="{ 'detail-muted-value': !prop.formattedValue }">{{ prop.formattedValue || '—' }}</div>
							<!-- Choice labels (array) -->
							<div v-else-if="prop.choiceLabels" class="prop-value-date-list">
								<div v-for="(lbl, idx) in prop.choiceLabels" :key="idx" class="prop-value-date-item" :class="{ 'detail-muted-value': !lbl }">{{ lbl || '—' }}</div>
								<span v-if="prop.choiceLabels.length === 0" class="detail-muted-value">—</span>
							</div>
							<!-- Choice label (single) -->
							<div v-else-if="prop.choiceLabel" class="detail-value text-break text-clamp-4">{{ prop.choiceLabel }}</div>
							<!-- Binary array property -->
							<div v-else-if="prop.type === 'BINARY' && prop.isArray" class="prop-binary-array-list">
								<div v-for="(mime, idx) in prop.mimeTypes" :key="idx" class="prop-binary-container">
									<div v-if="prop.isImages[idx] && prop.propertyDownloadURLs[idx]" class="prop-binary-preview">
										<img :src="prop.propertyDownloadURLs[idx]" class="prop-binary-preview-image" />
									</div>
									<div v-else class="prop-binary-icon">
										<i class="bi bi-file-earmark"></i>
										<span class="prop-binary-mime">{{ mime }}</span>
									</div>
									<div class="prop-binary-info">
										<span class="prop-binary-size">{{ prop.sizesFormatted[idx] }}</span>
										<a v-if="prop.propertyDownloadURLs[idx]" :href="prop.propertyDownloadURLs[idx] + '&attachment=true'" class="prop-binary-download" title="Download">
											<i class="bi bi-download"></i>
										</a>
									</div>
								</div>
								<span v-if="prop.mimeTypes.length === 0" class="detail-muted-value">—</span>
							</div>
							<!-- Binary single property -->
							<div v-else-if="prop.type === 'BINARY'" class="prop-binary-container">
								<div v-if="prop.isImage && prop.propertyDownloadURL" class="prop-binary-preview">
									<img :src="prop.propertyDownloadURL" class="prop-binary-preview-image" />
								</div>
								<div v-else class="prop-binary-icon">
									<i class="bi bi-file-earmark"></i>
									<span class="prop-binary-mime">{{ prop.mimeType }}</span>
								</div>
								<div class="prop-binary-info">
									<span class="prop-binary-size">{{ prop.sizeFormatted }}</span>
									<a v-if="prop.propertyDownloadURL" :href="prop.propertyDownloadURL + '&attachment=true'" class="prop-binary-download" title="Download">
										<i class="bi bi-download"></i>
									</a>
								</div>
							</div>
							<div v-else-if="prop.isArray" class="prop-value-date-list">
								<div v-for="(item, idx) in prop.items" :key="idx" class="prop-value-date-item" :class="{ 'detail-muted-value': !item }">{{ item || '—' }}</div>
								<span v-if="prop.items.length === 0" class="detail-muted-value">—</span>
							</div>
							<div v-else class="detail-value text-break text-clamp-4" :class="{ 'detail-muted-value': prop.value === '' || prop.value == null }">{{ (prop.value === '' || prop.value == null) ? '—' : prop.value }}</div>
						</div>
						<!-- Extra properties not in schema -->
						<div v-if="filteredSchemaDisplayProperties.extraProps.length > 0" class="custom-properties">
							<div class="detail-section schema-extra-divider">
								<span class="text-muted small">Other properties</span>
							</div>
							<div v-for="prop in filteredSchemaDisplayProperties.extraProps" :key="'e_' + prop.name" class="detail-section">
								<div class="detail-label detail-prop-label">
									<span class="detail-prop-name">{{ prop.name }}</span>
									<div class="detail-prop-badges">
										<span v-if="prop.type === 'DATE'" class="prop-tz-badge">{{ localTZ }}</span>
										<span class="prop-type-badge">{{ prop.isArray ? prop.type + '[]' : prop.type }}</span>
									</div>
								</div>
								<div v-if="prop.type === 'BINARY' && prop.isArray" class="prop-binary-array-list">
									<div v-for="(mime, idx) in prop.mimeTypes" :key="idx" class="prop-binary-container">
										<div v-if="prop.isImages[idx] && prop.propertyDownloadURLs[idx]" class="prop-binary-preview">
											<img :src="prop.propertyDownloadURLs[idx]" class="prop-binary-preview-image" />
										</div>
										<div v-else class="prop-binary-icon">
											<i class="bi bi-file-earmark"></i>
											<span class="prop-binary-mime">{{ mime }}</span>
										</div>
										<div class="prop-binary-info">
											<span class="prop-binary-size">{{ prop.sizesFormatted[idx] }}</span>
											<a v-if="prop.propertyDownloadURLs[idx]" :href="prop.propertyDownloadURLs[idx] + '&attachment=true'" class="prop-binary-download" title="Download">
												<i class="bi bi-download"></i>
											</a>
										</div>
									</div>
									<span v-if="prop.mimeTypes.length === 0" class="detail-muted-value">—</span>
								</div>
								<div v-else-if="prop.type === 'BINARY'" class="prop-binary-container">
									<div v-if="prop.isImage && prop.propertyDownloadURL" class="prop-binary-preview">
										<img :src="prop.propertyDownloadURL" class="prop-binary-preview-image" />
									</div>
									<div v-else class="prop-binary-icon">
										<i class="bi bi-file-earmark"></i>
										<span class="prop-binary-mime">{{ prop.mimeType }}</span>
									</div>
									<div class="prop-binary-info">
										<span class="prop-binary-size">{{ prop.sizeFormatted }}</span>
										<a v-if="prop.propertyDownloadURL" :href="prop.propertyDownloadURL + '&attachment=true'" class="prop-binary-download" title="Download">
											<i class="bi bi-download"></i>
										</a>
									</div>
								</div>
								<div v-else-if="prop.isArray" class="prop-value-date-list">
									<div v-for="(item, idx) in prop.items" :key="idx" class="prop-value-date-item" :class="{ 'detail-muted-value': !item }">{{ item || '—' }}</div>
									<span v-if="prop.items.length === 0" class="detail-muted-value">—</span>
								</div>
								<div v-else class="detail-value text-break text-clamp-4" :class="{ 'detail-muted-value': prop.value === '' || prop.value == null }">{{ (prop.value === '' || prop.value == null) ? '—' : prop.value }}</div>
							</div>
						</div>
					</div>

					<!-- Default view: no schema selected -->
					<div v-else class="custom-properties">
						<div v-for="prop in filteredDetailProperties" :key="prop.name" class="detail-section">
							<div class="detail-label detail-prop-label">
								<span class="detail-prop-name">{{ prop.name }}</span>
								<div class="detail-prop-badges">
									<span v-if="prop.type === 'DATE'" class="prop-tz-badge">{{ localTZ }}</span>
									<span class="prop-type-badge">{{ prop.isArray ? prop.type + '[]' : prop.type }}</span>
								</div>
							</div>
							<!-- Binary array property: multiple previews -->
							<div v-if="prop.type === 'BINARY' && prop.isArray" class="prop-binary-array-list">
								<div v-for="(mime, idx) in prop.mimeTypes" :key="idx" class="prop-binary-container">
									<div v-if="prop.isImages[idx] && prop.propertyDownloadURLs[idx]" class="prop-binary-preview">
										<img :src="prop.propertyDownloadURLs[idx]" class="prop-binary-preview-image" />
									</div>
									<div v-else class="prop-binary-icon">
										<i class="bi bi-file-earmark"></i>
										<span class="prop-binary-mime">{{ mime }}</span>
									</div>
									<div class="prop-binary-info">
										<span class="prop-binary-size">{{ prop.sizesFormatted[idx] }}</span>
										<a v-if="prop.propertyDownloadURLs[idx]" :href="prop.propertyDownloadURLs[idx] + '&attachment=true'" class="prop-binary-download" title="Download">
											<i class="bi bi-download"></i>
										</a>
									</div>
								</div>
								<span v-if="prop.mimeTypes.length === 0" class="detail-muted-value">—</span>
							</div>
							<!-- Binary single property: preview + download -->
							<div v-else-if="prop.type === 'BINARY'" class="prop-binary-container">
								<div v-if="prop.isImage && prop.propertyDownloadURL" class="prop-binary-preview">
									<img :src="prop.propertyDownloadURL" class="prop-binary-preview-image" />
								</div>
								<div v-else class="prop-binary-icon">
									<i class="bi bi-file-earmark"></i>
									<span class="prop-binary-mime">{{ prop.mimeType }}</span>
								</div>
								<div class="prop-binary-info">
									<span class="prop-binary-size">{{ prop.sizeFormatted }}</span>
									<a v-if="prop.propertyDownloadURL" :href="prop.propertyDownloadURL + '&attachment=true'" class="prop-binary-download" title="Download">
										<i class="bi bi-download"></i>
									</a>
								</div>
							</div>
							<div v-else-if="prop.isArray" class="prop-value-date-list">
								<div v-for="(item, idx) in prop.items" :key="idx" class="prop-value-date-item" :class="{ 'detail-muted-value': !item }">{{ item || '—' }}</div>
								<span v-if="prop.items.length === 0" class="detail-muted-value">—</span>
							</div>
							<div v-else class="detail-value text-break text-clamp-4" :class="{ 'detail-muted-value': prop.value === '' || prop.value == null }">{{ (prop.value === '' || prop.value == null) ? '—' : prop.value }}</div>
						</div>
					</div>
				</template>
			</div>

			<!-- Section 4: Quick Actions -->
			<div class="detail-section-header">Actions</div>

			<div class="detail-section-body">
				<div v-if="showOpenAction" class="detail-section">
					<button class="wt wt-primary w-100" @click="emitOpenItem(singleTarget)">
						<i class="bi me-1" :class="singleTarget.isCollection ? 'bi-folder2-open' : 'bi-box-arrow-up-right'"></i>
						{{ singleTarget.isCollection ? 'Open Folder' : 'Open File' }}
					</button>
				</div>
				<div v-if="!singleTarget.isCollection" class="detail-section">
					<button class="wt w-100" @click="emitRevealItem(singleTarget)">
						<i class="bi bi-folder2-open me-1"></i>
						Open Containing Folder
					</button>
				</div>
			</div>

			<!-- Section 5: Access Control -->
			<div class="detail-section-header">
				Access Control
				<button class="detail-section-header-btn ms-auto" @click="showDetailACLEditor" title="Edit Permissions">
					<i class="bi bi-pencil"></i>
				</button>
			</div>

			<div class="detail-section-body">
				<div v-if="detailACLLoading" class="detail-section text-center py-3">
					<span class="spinner-border spinner-border-sm"></span>
				</div>
				<div v-else-if="detailACL.length === 0" class="detail-section text-muted small">
					No access control policies
				</div>
				<template v-else>
					<div v-for="policy in detailACL" :key="policy.path" class="detail-acl-policy">
						<div class="detail-acl-path">
							<i class="bi bi-folder me-1"></i>
							<span class="text-break">{{ policy.path }}</span>
							<button class="detail-inline-btn ms-auto" @click="emitNavigatePath(policy.path)" title="Navigate to folder">
								<i class="bi bi-box-arrow-up-right"></i>
							</button>
						</div>
						<div class="detail-acl">
							<div v-for="entry in policy.entries" :key="entry.principal.id" class="detail-acl-entry">
								<div class="detail-acl-principal">
									<i class="bi me-1" :class="entry.principal.isGroup ? 'bi-people' : 'bi-person'"></i>{{ entry.principal.displayName || entry.principal.id }}
								</div>
								<div class="detail-acl-privileges">
									<span v-for="p in entry.privileges" :key="p" class="badge" :class="entry.allow ? 'acl-badge-allow' : 'acl-badge-deny'">
										<i class="bi me-1" :class="entry.allow ? 'bi-check-circle' : 'bi-x-circle'"></i>
										<span>{{ p }}</span>
									</span>
								</div>
							</div>
						</div>
					</div>
				</template>
			</div>
		</div>

		</template>

		<!-- Version History view (replaces Inspector content) -->
		<div v-if="detailVersionHistoryVisible" class="detail-overlay">
			<div class="detail-overlay-header">
				<button class="detail-overlay-back-btn" @click="closeDetailVersionHistory" title="Back">
					<i class="bi bi-arrow-left"></i>
				</button>
				<span class="detail-overlay-title">
					<i class="bi bi-clock-history me-1"></i>Version History
				</span>
			</div>

			<!-- No selection or multi-selection -->
			<div v-if="!singleTarget && multiTargets.length === 0" class="detail-overlay-body text-center text-muted py-4">
				<i class="bi bi-cursor-text d-block mb-2" style="font-size: 2rem; opacity: 0.5;"></i>
				Select an item to view version history.
			</div>

										<button type="button" class="wt-select-trigger" @click.stop="openPropEditChoicesSingleDropdown(prop, event)">
											<span class="wt-select-value" :class="{placeholder: !propEditorEditInput}">{{ propEditChoicesSingleLabel(prop) }}</span>
											<i class="bi bi-chevron-down wt-select-chevron"></i>
										</button>
									</div>
								</div>
								<!-- Single value input (non-REFERENCE/WEAKREFERENCE) -->
								<div v-if="!propEditorEditIsArray && prop.type !== 'REFERENCE' && prop.type !== 'WEAKREFERENCE' && prop.type !== 'BINARY' && !(prop.schemaChoices && prop.schemaChoices.length > 0)" class="prop-single-input">
									<input v-if="prop.type === 'DATE'" type="datetime-local" class="wt w-100" v-model="propEditorEditInput">
									<input v-else-if="prop.type === 'LONG'" type="number" step="1" class="wt w-100" v-model="propEditorEditInput">
									<input v-else-if="prop.type === 'DOUBLE' || prop.type === 'DECIMAL'" type="number" step="any" class="wt w-100" v-model="propEditorEditInput">
									<input v-else-if="prop.type === 'STRING' && prop.editorType === 'Color'" type="color" class="wt w-100 form-control-color" v-model="propEditorEditInput">
									<input v-else-if="prop.type === 'STRING' && prop.editorType === 'Tel'" type="tel" class="wt w-100" v-model="propEditorEditInput">
									<input v-else-if="prop.type === 'STRING' && prop.editorType === 'Email'" type="email" class="wt w-100" v-model="propEditorEditInput">
									<input v-else-if="prop.type === 'STRING' && prop.editorType === 'URL'" type="url" class="wt w-100" v-model="propEditorEditInput">
									<input v-else-if="prop.type === 'STRING' && prop.editorType === 'Password'" type="password" class="wt w-100" v-model="propEditorEditInput">
									<div v-else-if="prop.type === 'BOOLEAN' && prop.editorType === 'radio'" class="prop-radio-list">
										<label class="prop-radio-item"><input type="radio" class="wt" value="true" v-model="propEditorEditInput"><span>true</span></label>
										<label class="prop-radio-item"><input type="radio" class="wt" value="false" v-model="propEditorEditInput"><span>false</span></label>
									</div>
									<div v-else-if="prop.type === 'BOOLEAN'" class="wt-select">
										<button type="button" class="wt-select-trigger" @click.stop="openPropEditBooleanDropdown(event)">
											<span class="wt-select-value" :class="{placeholder: !propEditorEditInput}">{{ propEditorEditInput || '— Select —' }}</span>
											<i class="bi bi-chevron-down wt-select-chevron"></i>
										</button>
									</div>
									<textarea v-else-if="prop.editorType === 'TextArea'" class="wt w-100" v-model="propEditorEditInput" :rows="prop.editorRows || 3"></textarea>
									<div v-else-if="prop.editorType === 'Text Editor' || prop.editorType === 'JSON' || prop.editorType === 'XML' || prop.editorType === 'HTML' || prop.editorType === 'Markdown'" class="cm-inline-wrap">
										<div v-if="!cmExpanded" id="cm-editor-inline" class="cm-editor-inline" :style="{ height: 'calc(' + (prop.editorRows || 6) + 'lh + 2px)' }"></div>
										<div v-if="!cmExpanded" class="cm-inline-actions">
											<button class="wt wt-square fs-small" @click="toggleCmExpanded" title="Expand">
												<i class="bi bi-arrows-fullscreen"></i>
											</button>
										</div>
									</div>
									<input v-else type="text" class="wt w-100" v-model="propEditorEditInput">
								</div>
								<!-- Add row / Confirm / Cancel -->
								<div v-if="propEditorEditChoiceMismatch" class="prop-inline-warning">
									<i class="bi bi-exclamation-triangle-fill me-1"></i>{{ propEditorEditChoiceMismatch }}
								</div>
								<div v-if="propEditorEditError" class="prop-inline-error">
									<i class="bi bi-x-circle-fill me-1"></i>{{ propEditorEditError }}
								</div>
								<div class="prop-edit-actions">
									<button v-if="propEditorQueryConfig && (prop.type === 'REFERENCE' || prop.type === 'WEAKREFERENCE')" class="wt wt-secondary wt-slim fs-small" @click="refreshQueryItems" :disabled="propEditorQueryLoading" title="Refresh list">
										<i class="bi bi-arrow-clockwise" :class="{ 'spin': propEditorQueryLoading }"></i>
									</button>
									<button v-if="propEditorEditIsArray && prop.type !== 'REFERENCE' && prop.type !== 'WEAKREFERENCE' && prop.type !== 'BINARY'" class="wt wt-secondary wt-slim fs-small" @click="addEditChip" title="Add row"><i class="bi bi-plus-lg"></i></button>
									<div class="prop-edit-actions-right">
										<button class="wt wt-slim fs-small" @click="cancelPropertyEdit" title="Cancel"><i class="bi bi-x-lg"></i></button>
										<button class="wt wt-primary wt-slim fs-small" @click="confirmPropertyEdit" :disabled="binaryEditIsUploading || !!propEditorEditError" title="Confirm"><i class="bi bi-check-lg"></i></button>
									</div>
								</div>
							</div>
						</div>

						<!-- No properties message -->
						<div v-if="propEditorItems.length === 0 && !propEditorAddingNew" class="text-muted small py-2">
							No custom properties
						</div>

						<!-- Add new property form -->
						<div v-if="propEditorAddingNew" class="prop-add-form">
							<div class="prop-add-header">
								<input type="text" class="wt" v-model="propEditorNewName" placeholder="Property name" @keydown.enter.prevent="confirmAddProperty">
								<div class="wt-select prop-type-select">
									<button type="button" class="wt-select-trigger" @click.stop="openPropEditNewTypeDropdown(event)">
										<span class="wt-select-value">{{ propEditNewTypeLabel() }}</span>
										<i class="bi bi-chevron-down wt-select-chevron"></i>
									</button>
								</div>
								<button class="wt wt-outlined wt-square" @click="propEditorNewIsArray = !propEditorNewIsArray" title="Toggle array/single">
									<i class="bi" :class="propEditorNewIsArray ? 'bi-list-ul' : 'bi-dot'"></i>
								</button>
							</div>
							<!-- Confirm / Cancel -->
							<div class="prop-edit-actions">
								<div class="prop-edit-actions-right">
									<button class="wt wt-slim fs-small" @click="cancelAddProperty" title="Cancel"><i class="bi bi-x-lg"></i></button>
									<button class="wt wt-primary wt-slim fs-small" @click="confirmAddProperty" :disabled="!propEditorNewName.trim()" title="Confirm"><i class="bi bi-check-lg"></i></button>
								</div>
							</div>
						</div>

						<!-- Add property button (hidden when a schema is selected — properties
							are added via the missing-properties summary instead) -->
						<div v-if="!propEditorAddingNew && !propEditorSchemaKey" class="prop-add-btn-row">
							<button class="wt wt-primary wt-outlined" @click="startAddingProperty">
								<i class="bi bi-plus-lg me-1"></i><span>Add Property</span>
							</button>
						</div>

						<!-- Save error -->
						<div v-if="propEditorSaveError" class="text-danger mt-2 small">
							<i class="bi bi-exclamation-circle me-1"></i><span>{{ propEditorSaveError }}</span>
						</div>
					</div>
				</div>
			</div>

			<!-- Footer: Save / Revert -->
			<div v-if="!!singleTarget && !singleTarget.isCollection" class="detail-overlay-footer">
				<button class="wt" @click="revertAllProperties" :disabled="propEditorSaving">Revert</button>
				<button class="wt wt-primary" @click="saveAllProperties" :disabled="propEditorSaving || propEditorModifiedCount === 0 || propEditorEditingName !== null">
					<span v-if="propEditorSaving" class="spinner-border spinner-border-sm me-1"></span>
					Save
				</button>
			</div>
		</div>
	</div>
</template>
