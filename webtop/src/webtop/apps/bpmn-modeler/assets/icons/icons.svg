<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
	<!--
		BPMN type-switch menu icon sprite.
		Each <symbol> is referenced via <use href="icons.svg#id">.
		Shapes use stroke="currentColor" / fill="currentColor" so the icons
		follow the surrounding text color (popup item label color).
		viewBox is 0 0 20 20 to match the original inline-SVG geometry in
		index.html so the rendered output is pixel-equivalent.
	-->

	<!-- "blank" placeholder reserves the icon column width for items
		 without an icon (e.g. "None") so labels stay aligned. -->
	<symbol id="blank" viewBox="0 0 20 20"></symbol>

	<!-- Event icons -->
	<symbol id="message" viewBox="0 0 20 20">
		<path d="M2 4 L10 10 L18 4 M2 4 L2 16 L18 16 L18 4 L2 4" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="message-filled" viewBox="0 0 20 20">
		<path d="M2 4 L10 10 L18 4 L18 16 L2 16 Z" fill="currentColor"/>
	</symbol>
	<symbol id="timer" viewBox="0 0 20 20">
		<circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M10 5 L10 10 L13 12" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="conditional" viewBox="0 0 20 20">
		<path d="M3 3 L17 3 L17 17 L3 17 Z M5 7 L15 7 M5 10 L15 10 M5 13 L12 13" fill="none" stroke="currentColor" stroke-width="1.2"/>
	</symbol>
	<symbol id="signal" viewBox="0 0 20 20">
		<path d="M10 3 L17 17 L3 17 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="signal-filled" viewBox="0 0 20 20">
		<path d="M10 3 L17 17 L3 17 Z" fill="currentColor"/>
	</symbol>
	<symbol id="terminate" viewBox="0 0 20 20">
		<circle cx="10" cy="10" r="7" fill="currentColor"/>
	</symbol>
	<symbol id="error" viewBox="0 0 20 20">
		<path d="M4 17 L10 3 L13 10 L16 3 L13 17 L10 10 Z" fill="currentColor"/>
	</symbol>
	<symbol id="escalation" viewBox="0 0 20 20">
		<path d="M10 3 L16 17 L10 11 L4 17 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="escalation-filled" viewBox="0 0 20 20">
		<path d="M10 3 L16 17 L10 11 L4 17 Z" fill="currentColor"/>
	</symbol>
	<symbol id="link" viewBox="0 0 20 20">
		<path d="M4 10 L14 10 L14 6 L18 10 L14 14 L14 10" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="link-filled" viewBox="0 0 20 20">
		<path d="M4 10 L14 10 L14 6 L18 10 L14 14 L14 10 Z" fill="currentColor"/>
	</symbol>
	<symbol id="compensation" viewBox="0 0 20 20">
		<path d="M10 4 L4 10 L10 16 M16 4 L10 10 L16 16" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="compensation-filled" viewBox="0 0 20 20">
		<path d="M10 4 L4 10 L10 16 Z M16 4 L10 10 L16 16 Z" fill="currentColor"/>
	</symbol>

	<!-- Task icons -->
	<symbol id="user" viewBox="0 0 20 20">
		<circle cx="10" cy="6" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M3 18 Q10 12 17 18" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="service" viewBox="0 0 20 20">
		<circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<circle cx="10" cy="10" r="2" fill="currentColor"/>
	</symbol>
	<symbol id="script" viewBox="0 0 20 20">
		<path d="M6 3 L6 12 Q6 14 8 14 L12 14 Q14 14 14 16 L14 18" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="manual" viewBox="0 0 20 20">
		<path d="M5 10 L10 5 L15 10 L10 15 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="send" viewBox="0 0 20 20">
		<path d="M2 4 L10 10 L18 4 L18 16 L2 16 Z" fill="currentColor"/>
	</symbol>
	<symbol id="receive" viewBox="0 0 20 20">
		<path d="M2 4 L10 10 L18 4 M2 4 L2 16 L18 16 L18 4 L2 4" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="businessRule" viewBox="0 0 20 20">
		<rect x="2" y="3" width="16" height="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M2 7 L18 7 M7 7 L7 17" stroke="currentColor" stroke-width="1" fill="none"/>
	</symbol>
	<symbol id="callActivity" viewBox="0 0 20 20">
		<rect x="2" y="3" width="16" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="3"/>
	</symbol>

	<!-- Gateway icons -->
	<symbol id="exclusive" viewBox="0 0 20 20">
		<path d="M10 2 L18 10 L10 18 L2 10 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M6 6 L14 14 M14 6 L6 14" stroke="currentColor" stroke-width="1.5" fill="none"/>
	</symbol>
	<symbol id="parallel" viewBox="0 0 20 20">
		<path d="M10 2 L18 10 L10 18 L2 10 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M10 5 L10 15 M5 10 L15 10" stroke="currentColor" stroke-width="1.5" fill="none"/>
	</symbol>
	<symbol id="inclusive" viewBox="0 0 20 20">
		<path d="M10 2 L18 10 L10 18 L2 10 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<circle cx="10" cy="10" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="eventBased" viewBox="0 0 20 20">
		<path d="M10 2 L18 10 L10 18 L2 10 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<circle cx="10" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="1"/>
		<path d="M10 5 L12.5 8.5 L10.5 8.5 L10.5 15 L9.5 15 L9.5 8.5 L7.5 8.5 Z" fill="currentColor" transform="scale(0.6) translate(7, 7)"/>
	</symbol>
	<symbol id="complex" viewBox="0 0 20 20">
		<path d="M10 2 L18 10 L10 18 L2 10 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M10 5 L10 15 M5 10 L15 10 M6.5 6.5 L13.5 13.5 M13.5 6.5 L6.5 13.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
	</symbol>

	<!-- Sub-process icons -->
	<symbol id="collapsed" viewBox="0 0 20 20">
		<rect x="2" y="4" width="16" height="12" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<rect x="7" y="12" width="6" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
		<path d="M8.5 14 L11.5 14 M10 12.5 L10 15.5" stroke="currentColor" stroke-width="0.8" fill="none"/>
	</symbol>
	<symbol id="expanded" viewBox="0 0 20 20">
		<rect x="2" y="2" width="16" height="16" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<rect x="13" y="3" width="4" height="3" fill="none" stroke="currentColor" stroke-width="0.8"/>
		<path d="M14 4.5 L16 4.5" stroke="currentColor" stroke-width="0.8" fill="none"/>
	</symbol>
	<symbol id="event" viewBox="0 0 20 20">
		<rect x="2" y="4" width="16" height="12" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2,1"/>
		<rect x="7" y="12" width="6" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
		<path d="M8.5 14 L11.5 14 M10 12.5 L10 15.5" stroke="currentColor" stroke-width="0.8" fill="none"/>
	</symbol>
	<symbol id="transaction" viewBox="0 0 20 20">
		<rect x="2" y="4" width="16" height="12" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<rect x="3.5" y="5.5" width="13" height="9" rx="1.5" ry="1.5" fill="none" stroke="currentColor" stroke-width="0.8"/>
	</symbol>

	<!-- Canvas symbols (prefix "canvas-"). viewBox is sized to the parent
		 shape so a single <use href="#id" x="0" y="0" width="N" height="N"/>
		 renders the path at its original coordinates with no scaling
		 distortion. Symbols use currentColor so the icon color is driven
		 by the element CSS color property (set per element-type class).
		 Where two colors are needed (send-task and intermediate-throw
		 envelope), the secondary stroke uses the icon-accent custom
		 property with currentColor as fallback. -->

	<!-- Wrench (type-change action button); centered around (0,0). -->
	<symbol id="canvas-wrench" viewBox="-10 -10 20 20">
		<path d="M-4 -4 L4 4 M-2 -5 L-5 -2 M5 2 L2 5" stroke="currentColor" stroke-width="1.5" fill="none"/>
	</symbol>

	<!-- Start event sub-type icons (36x36 parent group) -->
	<symbol id="canvas-start-message" viewBox="0 0 36 36">
		<path d="M8 11 L18 18 L28 11 M8 11 L8 25 L28 25 L28 11 L8 11" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-start-timer" viewBox="0 0 36 36">
		<circle cx="18" cy="18" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M18 12 L18 18 L22 20" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-start-conditional" viewBox="0 0 36 36">
		<path d="M10 10 L26 10 L26 26 L10 26 Z M12 14 L24 14 M12 18 L24 18 M12 22 L20 22" fill="none" stroke="currentColor" stroke-width="1.2"/>
	</symbol>
	<symbol id="canvas-start-signal" viewBox="0 0 36 36">
		<path d="M18 8 L28 26 L8 26 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>

	<!-- End event sub-type icons (filled). -->
	<symbol id="canvas-end-message" viewBox="0 0 36 36">
		<path d="M8 11 L18 18 L28 11 L28 25 L8 25 L8 11 Z" fill="currentColor" stroke="none"/>
	</symbol>
	<symbol id="canvas-end-terminate" viewBox="0 0 36 36">
		<circle cx="18" cy="18" r="10" fill="currentColor"/>
	</symbol>
	<symbol id="canvas-end-error" viewBox="0 0 36 36">
		<path d="M10 26 L18 10 L22 18 L26 10 L22 26 L18 18 Z" fill="currentColor" stroke="none"/>
	</symbol>
	<symbol id="canvas-end-escalation" viewBox="0 0 36 36">
		<path d="M18 8 L26 26 L18 18 L10 26 Z" fill="currentColor" stroke="none"/>
	</symbol>
	<symbol id="canvas-end-signal" viewBox="0 0 36 36">
		<path d="M18 8 L28 26 L8 26 Z" fill="currentColor" stroke="none"/>
	</symbol>

	<!-- Intermediate event icons (smaller geometry than start/end). -->
	<symbol id="canvas-intermediate-message-catch" viewBox="0 0 36 36">
		<path d="M10 12 L18 17 L26 12 M10 12 L10 24 L26 24 L26 12 L10 12" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-intermediate-message-throw" viewBox="0 0 36 36">
		<path d="M10 12 L18 17 L26 12 L26 24 L10 24 Z" fill="currentColor" stroke="none"/>
		<path d="M10 12 L18 17 L26 12" fill="none" stroke="var(--icon-accent, currentColor)" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-intermediate-timer" viewBox="0 0 36 36">
		<circle cx="18" cy="18" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M18 13 L18 18 L21 20" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-intermediate-conditional" viewBox="0 0 36 36">
		<path d="M11 10 L25 10 L25 26 L11 26 Z M13 14 L23 14 M13 18 L23 18 M13 22 L20 22" fill="none" stroke="currentColor" stroke-width="1.2"/>
	</symbol>
	<symbol id="canvas-intermediate-signal-catch" viewBox="0 0 36 36">
		<path d="M18 10 L26 24 L10 24 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-intermediate-signal-throw" viewBox="0 0 36 36">
		<path d="M18 10 L26 24 L10 24 Z" fill="currentColor" stroke="none"/>
	</symbol>
	<symbol id="canvas-intermediate-link-catch" viewBox="0 0 36 36">
		<path d="M10 18 L22 18 L22 13 L28 18 L22 23 L22 18" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-intermediate-link-throw" viewBox="0 0 36 36">
		<path d="M10 18 L22 18 L22 13 L28 18 L22 23 L22 18" fill="currentColor" stroke="none"/>
	</symbol>
	<symbol id="canvas-intermediate-escalation-catch" viewBox="0 0 36 36">
		<path d="M18 8 L26 26 L18 18 L10 26 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-intermediate-escalation-throw" viewBox="0 0 36 36">
		<path d="M18 8 L26 26 L18 18 L10 26 Z" fill="currentColor" stroke="none"/>
	</symbol>
	<symbol id="canvas-intermediate-compensation-catch" viewBox="0 0 36 36">
		<path d="M18 10 L10 18 L18 26 M26 10 L18 18 L26 26" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-intermediate-compensation-throw" viewBox="0 0 36 36">
		<path d="M18 10 L10 18 L18 26 M26 10 L18 18 L26 26" fill="currentColor" stroke="none"/>
	</symbol>

	<!-- Boundary event icons (all outline, share many paths with intermediate-catch). -->
	<symbol id="canvas-boundary-message" viewBox="0 0 36 36">
		<path d="M10 12 L18 17 L26 12 M10 12 L10 24 L26 24 L26 12 L10 12" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-boundary-timer" viewBox="0 0 36 36">
		<circle cx="18" cy="18" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M18 13 L18 18 L21 20" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-boundary-conditional" viewBox="0 0 36 36">
		<path d="M11 10 L25 10 L25 26 L11 26 Z M13 14 L23 14 M13 18 L23 18 M13 22 L20 22" fill="none" stroke="currentColor" stroke-width="1.2"/>
	</symbol>
	<symbol id="canvas-boundary-signal" viewBox="0 0 36 36">
		<path d="M18 10 L26 24 L10 24 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-boundary-error" viewBox="0 0 36 36">
		<path d="M10 26 L18 10 L22 18 L26 10 L22 26 L18 18 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-boundary-escalation" viewBox="0 0 36 36">
		<path d="M18 8 L26 26 L18 18 L10 26 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-boundary-compensation" viewBox="0 0 36 36">
		<path d="M18 10 L10 18 L18 26 M26 10 L18 18 L26 26" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>

	<!-- Top-level task icons (rendered in top-left of 100x80 task box). -->
	<symbol id="canvas-task-user" viewBox="0 0 100 80">
		<path d="M10 16 a6 6 0 1 0 12 0 a6 6 0 1 0 -12 0" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M8 28 Q16 22 24 28" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-task-service" viewBox="0 0 100 80">
		<circle cx="16" cy="16" r="8" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<circle cx="16" cy="16" r="3" fill="currentColor"/>
	</symbol>
	<symbol id="canvas-task-script" viewBox="0 0 100 80">
		<path d="M10 8 L10 22 Q10 25 13 25 L18 25 Q21 25 21 28 L21 36" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-task-manual" viewBox="0 0 100 80">
		<path d="M10 20 L16 14 L22 20 L16 26 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-task-send" viewBox="0 0 100 80">
		<rect x="6" y="10" width="20" height="14" fill="currentColor" stroke="currentColor" stroke-width="1"/>
		<path d="M6 10 L16 18 L26 10" fill="none" stroke="var(--icon-accent, currentColor)" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-task-receive" viewBox="0 0 100 80">
		<rect x="6" y="10" width="20" height="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M6 10 L16 18 L26 10" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-task-businessRule" viewBox="0 0 100 80">
		<rect x="6" y="8" width="20" height="18" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<line x1="6" y1="14" x2="26" y2="14" stroke="currentColor" stroke-width="1.5"/>
		<line x1="6" y1="20" x2="26" y2="20" stroke="currentColor" stroke-width="1.5"/>
		<line x1="13" y1="14" x2="13" y2="26" stroke="currentColor" stroke-width="1.5"/>
		<rect x="6" y="8" width="20" height="6" fill="currentColor"/>
	</symbol>

	<!-- Top-level gateway markers (50x50 diamond). -->
	<symbol id="canvas-gateway-exclusive" viewBox="0 0 50 50">
		<path d="M15 15 L35 35 M35 15 L15 35" stroke="currentColor" stroke-width="3" fill="none"/>
	</symbol>
	<symbol id="canvas-gateway-parallel" viewBox="0 0 50 50">
		<path d="M25 12 L25 38 M12 25 L38 25" stroke="currentColor" stroke-width="3" fill="none"/>
	</symbol>
	<symbol id="canvas-gateway-inclusive" viewBox="0 0 50 50">
		<circle cx="25" cy="25" r="10" fill="none" stroke="currentColor" stroke-width="3"/>
	</symbol>
	<symbol id="canvas-gateway-eventBased" viewBox="0 0 50 50">
		<circle cx="25" cy="25" r="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<circle cx="25" cy="25" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<polygon points="25,16 32,22 30,31 20,31 18,22" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-gateway-complex" viewBox="0 0 50 50">
		<path d="M25 15 L25 35 M15 25 L35 25 M18 18 L32 32 M32 18 L18 32" stroke="currentColor" stroke-width="2" fill="none"/>
	</symbol>

	<!-- Sub-process expand/collapse box markers (16x16 area centered on origin). -->
	<symbol id="canvas-subprocess-plus" viewBox="-8 -8 16 16">
		<rect x="-8" y="-8" width="16" height="16" fill="white" stroke="currentColor" stroke-width="1"/>
		<path d="M-4 0 L4 0 M0 -4 L0 4" stroke="currentColor" stroke-width="1.5" fill="none"/>
	</symbol>
	<symbol id="canvas-subprocess-minus" viewBox="-8 -8 16 16">
		<rect x="-8" y="-8" width="16" height="16" fill="white" stroke="currentColor" stroke-width="1"/>
		<path d="M-4 0 L4 0" stroke="currentColor" stroke-width="1.5" fill="none"/>
	</symbol>

	<!-- Data object collection marker (3 vertical bars, centered on origin). -->
	<symbol id="canvas-collection-marker" viewBox="-8 0 16 8">
		<line x1="-6" y1="0" x2="-6" y2="8" stroke="currentColor" stroke-width="1.5"/>
		<line x1="0" y1="0" x2="0" y2="8" stroke="currentColor" stroke-width="1.5"/>
		<line x1="6" y1="0" x2="6" y2="8" stroke="currentColor" stroke-width="1.5"/>
	</symbol>

	<!-- Child task icons inside expanded sub-process (smaller, drawn at translate(8,8)). -->
	<symbol id="canvas-child-task-user" viewBox="0 0 16 24">
		<circle cx="8" cy="6" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M0 18 C0 12, 16 12, 16 18" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-child-task-service" viewBox="0 0 16 16">
		<circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<circle cx="8" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1"/>
	</symbol>
	<symbol id="canvas-child-task-script" viewBox="0 0 16 16">
		<path d="M2 0 L14 0 L14 16 L2 16 Z M4 4 L12 4 M4 8 L10 8 M4 12 L12 12" fill="none" stroke="currentColor" stroke-width="1.2"/>
	</symbol>
	<symbol id="canvas-child-task-manual" viewBox="0 0 16 16">
		<path d="M2 8 L8 2 L14 8 L8 14 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-child-task-send" viewBox="0 0 16 16">
		<rect x="0" y="2" width="16" height="12" fill="currentColor" stroke="currentColor" stroke-width="1"/>
		<path d="M0 2 L8 8 L16 2" fill="none" stroke="var(--icon-accent, currentColor)" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-child-task-receive" viewBox="0 0 16 16">
		<rect x="0" y="2" width="16" height="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<path d="M0 2 L8 8 L16 2" fill="none" stroke="currentColor" stroke-width="1.5"/>
	</symbol>
	<symbol id="canvas-child-task-businessRule" viewBox="0 0 16 16">
		<rect x="0" y="0" width="16" height="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
		<line x1="0" y1="5" x2="16" y2="5" stroke="currentColor" stroke-width="1.5"/>
		<line x1="0" y1="10" x2="16" y2="10" stroke="currentColor" stroke-width="1.5"/>
		<line x1="6" y1="5" x2="6" y2="14" stroke="currentColor" stroke-width="1.5"/>
		<rect x="0" y="0" width="16" height="5" fill="currentColor"/>
	</symbol>

	<!-- Child gateway markers inside expanded sub-process (smaller geometry). -->
	<symbol id="canvas-child-gateway-exclusive" viewBox="0 0 50 50">
		<path d="M18 18 L32 32 M32 18 L18 32" stroke="currentColor" stroke-width="3" fill="none"/>
	</symbol>
	<symbol id="canvas-child-gateway-parallel" viewBox="0 0 50 50">
		<path d="M25 15 L25 35 M15 25 L35 25" stroke="currentColor" stroke-width="3" fill="none"/>
	</symbol>
	<symbol id="canvas-child-gateway-inclusive" viewBox="0 0 50 50">
		<circle cx="25" cy="25" r="10" fill="none" stroke="currentColor" stroke-width="3"/>
	</symbol>
</svg>
