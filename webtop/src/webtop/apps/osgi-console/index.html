<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no">
	<title>OSGi Console</title>

	<!-- Bootstrap Icons (bundled with webtop; see webtop/rollup.config.js) -->
	<link rel="stylesheet" href="../../assets/vendor/bootstrap-icons/bootstrap-icons.min.css?v=__BUILD_VERSION__">

	<!-- Default CSS -->
	<link href="./assets/css/style.css?v=__BUILD_VERSION__" rel="stylesheet" />
	<link href="../../assets/css/webtop-app.css?v=__BUILD_VERSION__" rel="stylesheet" />
</head>

<body>
	<div id="app" v-cloak class="d-flex flex-column" @mounted="onMounted" @unmount="onUnmount">

		<!-- Top Toolbar (translucent) -->
		<nav class="nav-bar window-drag-region">
			<span class="nav-spacer"></span>

			<!-- Right: Window Controls -->
			<div class="window-controls">
				<button class="btn-icon" @click="onMinimizeWindow" title="Minimize">
					<i class="bi bi-dash-lg"></i>
				</button>
				<button class="btn-icon" @click="onToggleMaximizeWindow" title="Maximize">
					<i class="bi bi-square"></i>
				</button>
				<button class="btn-icon window-control-close" @click="onCloseWindow" title="Close">
					<i class="bi bi-x-lg"></i>
				</button>
			</div>
		</nav>

		<!-- Content body (single pane) -->
		<div class="content-body">
			<div class="content-main island">
				<iframe class="console-frame" src="/system/console" title="OSGi Console"></iframe>
			</div>
		</div>

		<!-- Bottom Status Bar (translucent, empty — same shape as editor apps) -->
		<div class="status-bar window-drag-region"></div>

	</div>

	<script type="module" src="./app.js?v=__BUILD_VERSION__"></script>
</body>
</html>
