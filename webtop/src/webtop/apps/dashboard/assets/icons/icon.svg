<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="today2">
  <defs>
    <clipPath id="clip-today2"><rect x="0" y="0" width="180" height="180" rx="42" ry="42"></rect></clipPath>
    <linearGradient id="hl-today2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"></stop>
      <stop offset="55%" stop-color="white" stop-opacity="0"></stop>
    </linearGradient>
  </defs>
  <defs>
    <linearGradient id="bg-today2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"></stop>
      <stop offset="100%" stop-color="#312e81"></stop>
    </linearGradient></defs>
  <rect x="0" y="0" width="180" height="180" rx="42" ry="42" fill="url(#bg-today2)"></rect>
  <g clip-path="url(#clip-today2)">
    <!-- agenda timeline -->
    <line x1="58" y1="58" x2="58" y2="122" stroke="white" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round"></line>
    <!-- dimmed rows -->
    <g>
      <circle cx="58" cy="60" r="6" fill="white" fill-opacity="0.45"></circle>
      <rect x="74" y="55" width="56" height="9" rx="4.5" fill="white" fill-opacity="0.45"></rect>
      <circle cx="58" cy="120" r="6" fill="white" fill-opacity="0.45"></circle>
      <rect x="74" y="115" width="42" height="9" rx="4.5" fill="white" fill-opacity="0.45"></rect>
    </g>
    <!-- highlighted NEXT item -->
    <rect x="42" y="78" width="100" height="24" rx="12" fill="white"></rect>
    <circle cx="58" cy="90" r="7" fill="#6366f1"></circle>
    <rect x="74" y="85" width="44" height="10" rx="5" fill="#6366f1"></rect>
    <!-- forward chevron = next -->
    <polyline points="124,84 133,90 124,96" fill="none" stroke="#6366f1" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
  </g>
  <g clip-path="url(#clip-today2)">
    <rect x="0" y="0" width="180" height="180" fill="url(#hl-today2)"></rect>
    <rect x="0.5" y="0.5" width="179" height="179" rx="41.5" ry="41.5" fill="none" stroke="white" stroke-opacity="0.18" stroke-width="1"></rect>
  </g>
</svg>
