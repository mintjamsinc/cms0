<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no">
	<title>Preview</title>

	<!-- Bootstrap Icons (bundled with webtop; see webtop/rollup.config.js) -->
	<link rel="stylesheet" href="../../assets/vendor/bootstrap-icons/bootstrap-icons.min.css?v=__BUILD_VERSION__">

	<!-- Default CSS -->
	<link href="./assets/css/style.css?v=__BUILD_VERSION__" rel="stylesheet" />
	<link href="../../assets/css/webtop-app.css?v=__BUILD_VERSION__" rel="stylesheet" />
</head>

<body>
	<div id="app" class="d-flex flex-column"
		@mounted="onMounted" @unmount="onUnmount"
		@dragover.prevent @drop.prevent>

		<!-- Top Toolbar (translucent) -->
		<nav class="nav-bar window-drag-region">
			<div class="pane-toggles">
				<span class="preview-title-text">
					<i class="bi bi-eye me-1"></i>
					<span>{{ t('app.text-editor-preview.toolbar.label') }}</span>
					<span v-if="fileName" class="preview-filename">— {{ fileName }}</span>
				</span>
				<!-- Pin: when on, the preview stops following the editor's
				     active tab and stays on the file it was pinned to. -->
				<button v-if="filePath"
					class="btn-icon pane-toggle-btn preview-pin-btn"
					:class="{ active: pinned }"
					@click="togglePin"
					:title="pinned ? t('app.text-editor-preview.toolbar.unpin') : t('app.text-editor-preview.toolbar.pin')">
					<i class="bi" :class="pinned ? 'bi-pin-angle-fill' : 'bi-pin-angle'"></i>
				</button>
			</div>

			<span class="nav-spacer"></span>

			<!-- Templated files render in real time for a chosen output
			     extension; the chooser is a click-to-edit field (like the
			     content-browser MIME type). Confirm refreshes the preview,
			     cancel leaves it unchanged. Scriptable (non-templated) files
			     are evaluated at their own path, so they show no chooser. -->
			<div v-if="isTemplated" class="preview-ext-group">
				<div v-if="extEditing" class="preview-ext-editor">
					<div class="input-group">
						<input type="text" v-model="extInput"
							class="preview-ext-editor-input"
							placeholder="html"
							spellcheck="false"
							@keydown="handleExtKeydown" />
						<div class="input-group-actions">
							<button class="input-group-btn"
								@click="confirmExtEdit"
								:disabled="!extInput.trim()"
								:title="t('common.confirm')">
								<i class="bi bi-check-lg"></i>
							</button>
							<button class="input-group-btn"
								@click="cancelExtEdit"
								:title="t('common.cancel')">
								<i class="bi bi-x-lg"></i>
							</button>
						</div>
					</div>
				</div>
				<div v-else class="preview-ext-clickable"
					@click="startExtEdit"
					:title="t('app.text-editor-preview.toolbar.ext.change')">
					.{{ previewExtension }}
				</div>
			</div>

			<!-- Window Controls -->
			<div class="window-controls">
				<button class="btn-icon" @click="onMinimizeWindow" :title="t('common.minimize')">
					<i class="bi bi-dash-lg"></i>
				</button>
				<button class="btn-icon" @click="onToggleMaximizeWindow" :title="t('common.maximize')">
					<i class="bi bi-square"></i>
				</button>
				<button class="btn-icon window-control-close" @click="onCloseWindow" :title="t('common.close')">
					<i class="bi bi-x-lg"></i>
				</button>
			</div>
		</nav>

		<!-- Body -->
		<div class="content-body">
			<div class="preview-main island p-0">
				<div class="preview-body" :class="{ 'preview-body-iframe': isHtml || isServerRendered }">

					<!-- Disconnected state (editor closed or tab closed) -->
					<div v-if="disconnected" class="detail-panel-empty">
						<i class="bi bi-link-45deg"></i>
						<span>{{ t('app.text-editor-preview.empty.disconnected') }}</span>
					</div>

					<!-- Server-rendered (templated or scriptable; real-time) -->
					<template v-else-if="isServerRendered">
						<div v-if="previewError" class="detail-panel-empty">
							<i class="bi bi-exclamation-triangle"></i>
							<span>{{ previewError }}</span>
						</div>
						<iframe v-else-if="previewIframeUrl"
							class="preview-iframe"
							:src="previewIframeUrl"
							@load="onIframeLoad"
							sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
							referrerpolicy="no-referrer"></iframe>
						<div v-else class="detail-panel-empty">
							<i class="bi" :class="previewLoading ? 'bi-arrow-repeat spin' : 'bi-eye'"></i>
							<span>{{ previewLoading ? t('app.text-editor-preview.empty.rendering') : t('app.text-editor-preview.empty.placeholder') }}</span>
						</div>
					</template>

					<!-- Markdown -->
					<div v-else-if="isMarkdown" class="markdown-body" v-html="previewHtml"></div>

					<!-- Plain HTML (real-time client-side preview). When the service
					     worker serves the document (previewIframeUrl set) the iframe
					     loads a real same-origin URL so site-root-absolute assets
					     resolve; otherwise it falls back to srcdoc, which still
					     resolves relative assets via the injected <base>. -->
					<template v-else-if="isHtml">
						<iframe v-if="previewIframeUrl"
							class="preview-iframe"
							:src="previewIframeUrl"
							@load="onIframeLoad"
							sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
							referrerpolicy="no-referrer"></iframe>
						<iframe v-else
							class="preview-iframe"
							:srcdoc="previewSrcDoc"
							@load="onIframeLoad"
							sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
							referrerpolicy="no-referrer"></iframe>
					</template>

					<!-- Unsupported -->
					<div v-else class="detail-panel-empty">
						<i class="bi bi-eye-slash"></i>
						<span>{{ t('app.text-editor-preview.empty.unsupported') }}</span>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script type="module" src="./app.js?v=__BUILD_VERSION__"></script>
</body>

</html>
