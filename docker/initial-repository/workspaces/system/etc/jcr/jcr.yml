defaultNodes:
  - path: /
    primaryType: mi:root
    acl:
      - group: everyone
        privileges: jcr:read, jcr:readAccessControl, jcr:lockManagement, jcr:versionManagement, jcr:nodeTypeManagement
        effect: allow
      - user: anonymous
        privileges: jcr:all
        effect: deny

  # --- Commerce platform ACLs -------------------------------------------------
  # Repository-wide READ is already granted to 'everyone' on / above and is
  # inherited here, so these nodes only need to ADD write. They are created at
  # first boot (before the commerce content is deployed), and the deployed
  # content underneath inherits these grants.
  #
  # Why grants are required: the commerce integration runs CMS work as
  # 'commerce-service-user' (EIP routes / BPMN service tasks via runAs). That run
  # identity is a regular principal - NOT a ServicePrincipal - so it is subject
  # to ACLs (see JcrAccessControlManager#getPrivileges). It is a member of
  # 'commerce-service-group' (declared on the service account in cms.yml), which
  # is what these entries grant. The built-in 'admin' user bypasses ACLs via the
  # administrator role and needs no entry. 'commerce-operators' is the group for
  # delegating commerce administration to non-admin operators (the admin
  # endpoints now run as the logged-in operator); create the group and add
  # operators to it via the Identity Manager app.

  # Business data written by the service user (event log, orders, inventory,
  # products, CRM, reconciliation, tasks, health, ...) and by operators
  # (PIM/pages edits, outbound-sync audit, on-demand recompute/reconcile).
  - path: /content/commerce
    primaryType: nt:folder
    acl:
      - group: commerce-service-group
        privileges: jcr:write
        effect: allow
      - group: commerce-operators
        privileges: jcr:write
        effect: allow

  # Public storefront projection: rebuilt by the catalog/pages timers as the
  # service user and on-demand by an operator from the storefront endpoint.
  # Anonymous READ is provided by the security.filters publicAccess rule for
  # /content/public/* below; these entries add write for the publishers.
  - path: /content/public/commerce
    primaryType: nt:folder
    acl:
      - group: commerce-service-group
        privileges: jcr:write
        effect: allow
      - group: commerce-operators
        privileges: jcr:write
        effect: allow

  # Commerce configuration. The *.yml here are read-only config (covered by the
  # repository-wide 'everyone' read). The service user additionally needs write
  # to persist the cached Shopify Admin API access token
  # (/etc/commerce/config/access_token). Operators stay read-only; their
  # best-effort token caching simply no-ops.
  - path: /etc/commerce/config
    primaryType: nt:folder
    acl:
      - group: commerce-service-group
        privileges: jcr:write
        effect: allow

search:
    suggestion:
        propertyKeys: mi:suggestions

security:
    filters: [
        { path: /content/public/*, user: anonymous, type: publicAccess },
        { path: /content/WEB-INF/*, user: anonymous, type: publicAccess }
        ]
